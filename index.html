<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manitas Express – Gestión de Obras</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{--navy:#232B30;--navy2:#1A2126;--navy-light:#2D3841;--accent:#948671;--accent-light:#B5A88E;--accent-dark:#7A6D5B;--bg:#F5F3EF;--card:#fff;--border:#E8E4DC;--text:#232B30;--muted:#8B857A;--green:#16A34A;--red:#DC2626;--blue:#3B82F6;--purple:#8B5CF6;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
/* ── Sidebar ── */
.side{width:220px;background:linear-gradient(180deg,var(--navy2),var(--navy));color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.side-logo{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.side-logo b{font-size:15px;letter-spacing:-.3px}
.side-logo small{display:block;font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.5px}
.side nav{flex:1;padding:12px 8px}
.nbtn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;border-radius:8px;cursor:pointer;font-size:13px;background:transparent;color:rgba(255,255,255,.55);text-align:left;margin-bottom:2px;font-family:inherit}
.nbtn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.nbtn.on{background:rgba(255,255,255,.12);color:#fff;font-weight:700}
.side-foot{padding:12px 8px 16px;border-top:1px solid rgba(255,255,255,.08)}
.side-foot button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-family:inherit;margin-bottom:4px}
.side-foot button:hover{background:rgba(255,255,255,.12)}
/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;padding:14px 28px;background:var(--card);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.topbar h2{font-size:18px;font-weight:700;flex:1;margin:0}
.topbar input{padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;width:180px;outline:none;background:#F8FAFC;font-family:inherit}
.btn-new{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-new:hover{opacity:.9}
.btn-back{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px}
.content{flex:1;overflow:auto;padding:20px 28px 40px}
/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:16px;overflow:hidden}
.card-h{padding:13px 20px;border-bottom:1px solid #F1F5F9;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.card-b{padding:16px 20px}
/* ── KPIs ── */
.kpis{display:grid;gap:14px;margin-bottom:20px}
.k3{grid-template-columns:repeat(3,1fr)}.k4{grid-template-columns:repeat(4,1fr)}.k5{grid-template-columns:repeat(5,1fr)}
.kpi{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:center;gap:12px}
.kpi-i{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.kpi-v{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.kpi-l{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* ── Tables ── */
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;padding:8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;white-space:nowrap}
th.sort{cursor:pointer}th.sort:hover{color:var(--text)}
td{padding:8px;vertical-align:middle}
thead tr{border-bottom:2px solid var(--border)}
tbody tr{border-bottom:1px solid #F8FAFC;transition:background .1s}
tbody tr:hover{background:#F8FAFC}
tfoot tr{border-top:2px solid var(--border)}
/* ── Badge ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-green{background:#dcfce7;color:var(--green)}.b-gray{background:#f1f5f9;color:#6B7280}.b-yellow{background:#fef9c3;color:#a16207}
/* ── Buttons ── */
.btn-p{width:100%;padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:var(--navy);color:#fff;font-family:inherit}
.btn-p:disabled{background:#CBD5E1;cursor:default}
.btn-o{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:#F1F5F9;color:var(--muted);font-family:inherit}
.btn-o:hover{background:var(--border)}
.btn-d{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:#FEE2E2;color:var(--red);font-family:inherit}
.btn-x{background:none;border:none;cursor:pointer;color:#CBD5E1;padding:4px;font-size:14px}
.btn-x:hover{color:var(--red)}
/* ── Forms ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;outline:none;background:#F8FAFC;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--navy)}
.row{display:flex;gap:12px}.row>div{flex:1}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:#F1F5F9;color:var(--muted)}
.pill.on{background:var(--navy);color:#fff}
.stepper{display:flex;align-items:center;gap:8px;justify-content:center}
.stepper button{width:40px;height:40px;border-radius:8px;border:none;background:#F1F5F9;font-size:20px;font-weight:700;cursor:pointer;color:var(--navy);font-family:inherit}
.stepper span{font-size:28px;font-weight:800;min-width:50px;text-align:center}
.trab-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;margin:0 6px 6px 0;background:#F1F5F9;color:var(--text)}
.trab-btn.on{background:var(--navy);color:#fff}
.total-box{border-radius:8px;padding:8px 14px;display:flex;justify-content:space-between;font-size:13px;margin-bottom:14px}
/* ── Modal ── */
.overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.35)}
.modal{position:relative;background:var(--card);border-radius:16px;width:460px;max-width:94vw;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid #F1F5F9;position:sticky;top:0;background:var(--card);z-index:1}
.modal-h span{font-size:17px;font-weight:700}
.modal-c{background:#F1F5F9;border:none;border-radius:6px;padding:6px 8px;cursor:pointer;font-size:16px}
.modal-b{padding:24px}
/* ── Confirm ── */
.confirm{background:var(--card);border-radius:16px;padding:28px;max-width:380px;width:90vw;text-align:center;position:relative}
.confirm p{font-size:15px;font-weight:600;margin:12px 0 20px}
.confirm-btns{display:flex;gap:10px}.confirm-btns>*{flex:1}
/* ── Toast ── */
.toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:300;transition:top .3s;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.toast.show{top:16px}
/* ── Grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:16px}
/* ── Chart containers ── */
.chart-box{position:relative;height:250px;width:100%}
/* ── Filters ── */
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.filters select{padding:6px 12px;border-radius:6px;border:1px solid var(--border);font-size:12px;background:#fff;font-family:inherit}
.filters .ftot{margin-left:auto;font-size:13px;color:var(--muted)}
/* ── Progress ── */
.pbar{display:flex;align-items:center;gap:6px}
.pbar-t{flex:1;height:6px;border-radius:3px;background:#F1F5F9;overflow:hidden}
.pbar-f{height:100%;border-radius:3px}
.pbar-l{font-size:11px;font-weight:600;color:var(--muted);min-width:32px;text-align:right}
.bbar{background:var(--card);border-radius:var(--radius);padding:12px 20px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:18px}
.bbar-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.bbar-track{height:10px;border-radius:5px;background:#F1F5F9;overflow:hidden}
.bbar-fill{height:100%;border-radius:5px;transition:width .5s}
/* ── Tabs ── */
.tabs{display:flex;gap:2px;margin-bottom:16px}
.tab{padding:8px 20px;border:none;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:var(--muted);font-family:inherit}
.tab.on{background:var(--card);color:var(--text);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.04)}
/* ── Misc ── */
.fw7{font-weight:700}.fw8{font-weight:800}.mut{color:var(--muted)}.sm{font-size:12px}.xs{font-size:10px}
.tr{text-align:right}.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ptr{cursor:pointer}
.grn{color:var(--green)}.rd{color:var(--red)}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mb16{margin-bottom:16px}
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px}
/* ── Upload & Images ── */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s;background:#FAFBFC}
.upload-zone:hover{border-color:var(--navy);background:#F0F4F8}
.upload-zone input{display:none}
.upload-zone p{margin:8px 0 0;font-size:13px;color:var(--muted)}
.upload-zone.has-img{border-style:solid;border-color:var(--green);padding:8px}
.upload-zone img{max-width:100%;max-height:200px;border-radius:8px;display:block;margin:0 auto}
.thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.thumb-placeholder{width:56px;height:56px;border-radius:8px;background:#F1F5F9;display:inline-flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox .lb-close{position:absolute;top:16px;right:20px;font-size:28px;color:#fff;cursor:pointer;background:rgba(0,0,0,.4);border:none;border-radius:8px;padding:4px 12px}
/* ── Doc status badges ── */
.b-blue{background:#DBEAFE;color:#2563EB}
.b-orange{background:#FEF3C7;color:#D97706}
.b-emerald{background:#D1FAE5;color:#059669}
/* ── Processing overlay ── */
.processing{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:16px;font-size:16px;font-weight:600}
.processing .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Smart upload button ── */
.smart-upload{display:flex;align-items:center;gap:12px;padding:16px 20px;background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;width:100%;margin-bottom:16px;transition:opacity .15s}
.smart-upload:hover{opacity:.9}
.smart-upload input{display:none}
.smart-upload .su-icon{font-size:28px}
.smart-upload small{font-weight:400;opacity:.7;font-size:12px;display:block;margin-top:2px}
/* ── API key banner ── */
.api-banner{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:13px;color:#92400E;display:flex;align-items:center;gap:12px}
.api-banner button{padding:6px 14px;border-radius:6px;border:none;background:var(--navy);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.avatar{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.ox{overflow-x:auto}
/* ── Login Screen ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy2) 0%,var(--navy) 50%,var(--navy-light) 100%);padding:20px}
.login-box{background:var(--card);border-radius:20px;width:400px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.4);overflow:hidden}
.login-header{background:linear-gradient(135deg,var(--navy),var(--navy-light));padding:36px 28px 24px;text-align:center;color:#fff}
.login-header img{width:110px;height:110px;object-fit:contain;display:block;margin:0 auto 8px;border-radius:12px}
.login-header h1{font-size:20px;font-weight:800;margin:0 0 4px;letter-spacing:-.3px}
.login-header small{font-size:11px;opacity:.6;letter-spacing:.5px;text-transform:uppercase}
.login-body{padding:28px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-field input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;outline:none;background:#F8FAFC;font-family:inherit;transition:border .2s}
.login-field input:focus{border-color:var(--navy)}
.login-btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--navy);color:#fff;transition:opacity .15s}
.login-btn:hover{opacity:.9}
.login-btn:disabled{background:#CBD5E1;cursor:default}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-bottom:14px;min-height:20px;font-weight:600}
.login-footer{text-align:center;padding:16px 28px 24px;border-top:1px solid var(--border)}
.login-footer button{background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;font-weight:600;font-family:inherit;text-decoration:underline}
.login-footer button:hover{opacity:.7}
/* ── User info sidebar ── */
.user-info{padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.user-avatar{width:28px;height:28px;border-radius:7px;background:var(--accent);color:var(--navy2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);line-height:1.3}
.user-role{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.4px}
.logout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;background:rgba(239,68,68,.15);color:rgba(239,68,68,.8);font-family:inherit;margin-bottom:4px}
.logout-btn:hover{background:rgba(239,68,68,.25)}
</style>
</head>

var currentUser=null,userProfile=null,_authReady=false;

async function initAuth(){
  if(!sbReady||!sb){
    // Sin Supabase → modo offline, mostrar app directamente
    showApp();return;
  }
  try{
    var res=await sb.auth.getSession();
    if(res.data&&res.data.session){
      currentUser=res.data.session.user;
      await loadProfile();
      showApp();
    }else{
      await checkShowRegister();
      showLogin();
    }
  }catch(e){console.error('Auth init error:',e);showApp()}

  sb.auth.onAuthStateChange(async function(event,session){
    if(event==='SIGNED_IN'&&session){
      currentUser=session.user;
      await loadProfile();
      showApp();
    }else if(event==='SIGNED_OUT'){
      currentUser=null;userProfile=null;
      showLogin();
    }
  });
}

async function loadProfile(){
  if(!currentUser||!sb)return;
  try{
    var res=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
    if(res.data)userProfile=res.data;
  }catch(e){console.error('Profile load error:',e)}
  updateUserUI();
}

function updateUserUI(){
  var bar=document.getElementById('user-info-bar');
  if(!bar)return;
  if(userProfile){
    bar.style.display='flex';
    document.getElementById('user-avatar').textContent=(userProfile.nombre||'?')[0].toUpperCase();
    document.getElementById('user-display-name').textContent=userProfile.nombre||userProfile.email;
    document.getElementById('user-display-role').textContent=userProfile.rol==='admin'?'Administrador':'Trabajador';
  }else{bar.style.display='none'}
}

function isAdmin(){return userProfile&&userProfile.rol==='admin'}

async function checkShowRegister(){
  if(!sb)return;
  try{
    var res=await sb.rpc('has_admin');
    var hasAdm=res.data===true;
    var regBtn=document.getElementById('toggle-register');
    var footer=document.getElementById('login-footer');
    if(!hasAdm&&footer)footer.style.display='block';
    else if(footer)footer.style.display='none';
  }catch(e){
    // Si la función no existe aún, mostrar opción de registro
    var footer=document.getElementById('login-footer');
    if(footer)footer.style.display='block';
  }
}

function toggleRegister(){
  var loginArea=document.getElementById('login-form-area');
  var regArea=document.getElementById('register-form-area');
  var toggleBtn=document.getElementById('toggle-register');
  var errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(regArea.style.display==='none'){
    loginArea.style.display='none';
    regArea.style.display='block';

  }else{

  }

async function doLogin(){
  var email=document.getElementById('login-email').value.trim();
  var pass=document.getElementById('login-pass').value;
  var errEl=document.getElementById('login-error');
  var btn=document.getElementById('login-btn');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Completa todos los campos';return}
  btn.disabled=true;btn.textContent='Entrando…';
  try{
    var res=await sb.auth.signInWithPassword({email:email,password:pass});
    if(res.error){errEl.textContent='Email o contraseña incorrectos';btn.disabled=false;btn.textContent='Entrar'}
  }catch(e){errEl.textContent='Error de conexión';btn.disabled=false;btn.textContent='Entrar'}
}

async function doRegister(){
  var nombre=document.getElementById('reg-name').value.trim();
  var email=document.getElementById('reg-email').value.trim();
  var pass=document.getElementById('reg-pass').value;
  var pass2=document.getElementById('reg-pass2').value;
  var errEl=document.getElementById('login-error');
  var btn=document.getElementById('reg-btn');
  errEl.textContent='';
  if(!nombre||!email||!pass){errEl.textContent='Completa todos los campos';return}
  if(pass.length<6){errEl.textContent='La contraseña debe tener al menos 6 caracteres';return}
  if(pass!==pass2){errEl.textContent='Las contraseñas no coinciden';return}
  btn.disabled=true;btn.textContent='Creando cuenta…';
  try{
    var res=await sb.auth.signUp({
      email:email,password:pass,
      options:{data:{nombre:nombre,rol:'admin'}}
    });
    if(res.error){
      errEl.textContent=res.error.message||'Error al crear cuenta';
      btn.disabled=false;btn.textContent='Crear cuenta administrador';
    }else if(res.data&&res.data.user&&!res.data.session){
      // Email confirmation required
      errEl.style.color='var(--green)';
      errEl.textContent='✅ Cuenta creada. Revisa tu email para confirmar.';
      btn.disabled=false;btn.textContent='Crear cuenta administrador';
    }
    // If session exists, onAuthStateChange will fire
  }catch(e){errEl.textContent='Error de conexión';btn.disabled=false;btn.textContent='Crear cuenta administrador'}
}

function setSyncStatus(s){
  var dot=document.getElementById('sync-dot');
  var txt=document.getElementById('sync-text');
  if(dot)dot.style.background=s==='online'?'#16A34A':s==='syncing'?'#F59E0B':'#EF4444';
  if(txt)txt.textContent=s==='online'?'Online — sincronizado':s==='syncing'?'Sincronizando…':'Offline — local';
}

function save(){
  saveLocal();
  if(!sbReady||!sb)return;
  sbSkip=true;
  setSyncStatus('syncing');
  var clean=JSON.parse(JSON.stringify(D));
  (clean.gastos||[]).forEach(function(g){delete g.imagen});
  (clean.presupuestos||[]).forEach(function(p){delete p.imagen});
  sb.from('app_data').upsert({id:1,data:clean,updated_at:new Date().toISOString()}).then(function(res){
    if(res.error){console.error('Supabase save error:',res.error);setSyncStatus('offline')}
    else{setSyncStatus('online')}
  });
}

function loadFromSupabase(cb){
  if(!sbReady||!sb){cb(null);return}
  sb.from('app_data').select('data').eq('id',1).single().then(function(res){
    if(res.error||!res.data){cb(null)}
    else{cb(res.data.data)}
  });
}

function startSupabaseListener(){
  if(!sbReady||!sb)return;
  sb.channel('app-sync').on('postgres_changes',{event:'*',schema:'public',table:'app_data'},function(payload){
    if(sbSkip){sbSkip=false;return}
    var val=payload.new?payload.new.data:null;
    if(val){
      var localImgs={};
      (D.gastos||[]).forEach(function(g){if(g.imagen)localImgs[g.id]=g.imagen});
      (D.presupuestos||[]).forEach(function(p){if(p.imagen)localImgs[p.id]=p.imagen});
      D={obras:val.obras||[],gastos:val.gastos||[],trabs:val.trabs||[],hrs:val.hrs||[],presupuestos:val.presupuestos||[],facturas:val.facturas||[]};
      if(!D.presupuestos)D.presupuestos=[];
      if(!D.facturas)D.facturas=[];
      D.gastos.forEach(function(g){if(localImgs[g.id])g.imagen=localImgs[g.id]});
      D.presupuestos.forEach(function(p){if(localImgs[p.id])p.imagen=localImgs[p.id]});
      saveLocal();
      render();
      setSyncStatus('online');
    }
  }).subscribe();
}

function flash(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function calc(){
  const g=D.gastos,h=D.hrs,o=D.obras,t=D.trabs;
  const tg=g.reduce((s,x)=>s+(x.total||0),0),th=h.reduce((s,x)=>s+(x.coste||0),0);
  const byObra=o.map(ob=>{const og=g.filter(x=>x.obraId===ob.id).reduce((s,x)=>s+(x.total||0),0);const oh=h.filter(x=>x.obraId===ob.id).reduce((s,x)=>s+(x.coste||0),0);const oH=h.filter(x=>x.obraId===ob.id).reduce((s,x)=>s+(x.horas||0),0);return{...ob,tG:og,tM:oh,tH:oH,tC:og+oh,margen:ob.presupuesto?ob.presupuesto-og-oh:null,pU:ob.presupuesto?pct(og+oh,ob.presupuesto):null}});
  const pm={};g.forEach(x=>{const k=(x.proveedor||'SIN').toUpperCase();pm[k]=(pm[k]||0)+(x.total||0)});
  const byProv=Object.entries(pm).map(([k,v])=>({name:k,total:v})).sort((a,b)=>b.total-a.total);
  const byTrab=t.map(tr=>{const w=h.filter(x=>x.trabId===tr.id);return{...tr,tH:w.reduce((s,x)=>s+(x.horas||0),0),tC:w.reduce((s,x)=>s+(x.coste||0),0),dias:[...new Set(w.map(x=>x.fecha))].length}});
  return{tg,th,total:tg+th,activas:o.filter(x=>x.estado==='Activa').length,byObra,byProv,byTrab};
}

/* Cambiar estado de obra: Activa ⇄ Finalizada */
function toggleEstadoObra(id){
  var o=D.obras.find(function(x){return x.id===id});
  if(!o)return;
  if(o.estado==='Activa'){
    o.estado='Finalizada';
    o.fechaFin=today();
    flash('🏁 Obra "'+o.nombre+'" finalizada');
  }else{
    o.estado='Activa';
    delete o.fechaFin;
    flash('▶️ Obra "'+o.nombre+'" reactivada');
  }
  save();render();
}

  const gl=D.gastos.filter(g=>g.obraId===selObra).sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));

  return`

var _hrsFiltro={periodo:'semana',trabId:'',obraId:''};

function fmtFechaLocal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function rangoSemana(){var now=new Date();var day=now.getDay()||7;var lun=new Date(now);lun.setDate(now.getDate()-day+1);var dom=new Date(lun);dom.setDate(lun.getDate()+6);return[fmtFechaLocal(lun),fmtFechaLocal(dom)]}
function rangoMes(){var now=new Date();var ini=new Date(now.getFullYear(),now.getMonth(),1);var fin=new Date(now.getFullYear(),now.getMonth()+1,0);return[fmtFechaLocal(ini),fmtFechaLocal(fin)]}
function rangoMesAnterior(){var now=new Date();var ini=new Date(now.getFullYear(),now.getMonth()-1,1);var fin=new Date(now.getFullYear(),now.getMonth(),0);return[fmtFechaLocal(ini),fmtFechaLocal(fin)]}

function hrsFiltradas(){
  var h=[...D.hrs];
  if(_hrsFiltro.periodo==='semana'){var r=rangoSemana();h=h.filter(function(x){return x.fecha>=r[0]&&x.fecha<=r[1]})}
  else if(_hrsFiltro.periodo==='mes'){var r2=rangoMes();h=h.filter(function(x){return x.fecha>=r2[0]&&x.fecha<=r2[1]})}
  if(_hrsFiltro.trabId)h=h.filter(function(x){return x.trabId===_hrsFiltro.trabId});
  if(_hrsFiltro.obraId)h=h.filter(function(x){return x.obraId===_hrsFiltro.obraId});
  return h.sort(function(a,b){return(b.fecha||'').localeCompare(a.fecha||'')});
}

function setHrsFiltro(k,v){_hrsFiltro[k]=v;render()}

function renderHoras(){
  var h=hrsFiltradas();
  var tH=h.reduce(function(s,x){return s+(x.horas||0)},0),tC=h.reduce(function(s,x){return s+(x.coste||0)},0);

  // Resumen por trabajador (del filtro actual)
  var porTrab={};
  h.forEach(function(x){
    if(!porTrab[x.trabId])porTrab[x.trabId]={h:0,c:0};
    porTrab[x.trabId].h+=x.horas||0;porTrab[x.trabId].c+=x.coste||0;
  });
  var resumenCards=Object.keys(porTrab).map(function(tid){
    var t=D.trabs.find(function(x){return x.id===tid});
    var nombre=t?t.nombre:'?';
    return'<div class="kpi" style="min-width:150px"><div class="avatar" style="flex-shrink:0">'+esc(nombre[0]||'?')+'</div><div><div class="kpi-v" style="font-size:17px">'+porTrab[tid].h+'h</div><div class="kpi-l">'+esc(nombre)+' · '+fmt(porTrab[tid].c)+'€</div></div></div>';
  }).join('');

  var etiquetaPeriodo=_hrsFiltro.periodo==='semana'?'Esta semana':_hrsFiltro.periodo==='mes'?'Este mes':'Todo';

  return'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">'+
    '<button class="smart-upload" style="margin:0;background:linear-gradient(135deg,#16A34A,#15803D)" onclick="openRegistroRapido()"><span class="su-icon">⚡</span><div>Registro rápido de día<small>Varios trabajadores de golpe</small></div></button>'+
    '<button class="smart-upload" style="margin:0;background:linear-gradient(135deg,var(--navy),var(--navy-light))" onclick="openInformeHoras()"><span class="su-icon">📄</span><div>Informe de horas<small>Semanal o mensual · imprimir</small></div></button>'+
  '</div>'+
  '<div class="filters" style="flex-wrap:wrap;gap:8px">'+
    '<button class="pill'+(_hrsFiltro.periodo==='semana'?' on':'')+'" onclick="setHrsFiltro(\'periodo\',\'semana\')">Esta semana</button>'+
    '<button class="pill'+(_hrsFiltro.periodo==='mes'?' on':'')+'" onclick="setHrsFiltro(\'periodo\',\'mes\')">Este mes</button>'+
    '<button class="pill'+(_hrsFiltro.periodo==='todo'?' on':'')+'" onclick="setHrsFiltro(\'periodo\',\'todo\')">Todo</button>'+
    '<select onchange="setHrsFiltro(\'trabId\',this.value)" style="padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-family:inherit">'+
      '<option value="">👥 Todos</option>'+D.trabs.map(function(t){return'<option value="'+t.id+'"'+(_hrsFiltro.trabId===t.id?' selected':'')+'>'+esc(t.nombre)+'</option>'}).join('')+
    '</select>'+
    '<select onchange="setHrsFiltro(\'obraId\',this.value)" style="padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-family:inherit">'+
      '<option value="">🏗️ Todas las obras</option>'+D.obras.map(function(o){return'<option value="'+o.id+'"'+(_hrsFiltro.obraId===o.id?' selected':'')+'>'+esc(o.nombre)+'</option>'}).join('')+
    '</select>'+
    '<span class="ftot" style="margin-left:auto">'+etiquetaPeriodo+': <b>'+tH+'h</b> · <b>'+fmt(tC)+'€</b></span>'+
  '</div>'+
  (resumenCards?'<div class="kpis" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:16px">'+resumenCards+'</div>':'')+
  '<div class="card"><div class="card-b ox"><table><thead><tr><th>Fecha</th><th>Obra</th><th>Trabajador</th><th>Horas</th><th>Coste</th><th>Notas</th><th></th></tr></thead><tbody>'+
  h.map(function(x){return'<tr><td>'+x.fecha+'</td><td class="mut ell" style="max-width:140px">'+esc(oName(x.obraId))+'</td><td class="fw7">'+esc(tName(x.trabId))+'</td><td class="fw7">'+x.horas+'h</td><td>'+fmt(x.coste)+'€</td><td class="mut sm ell" style="max-width:200px">'+esc(x.notas||'—')+'</td><td><button class="btn-x" onclick="confirmDel(\'hrs\',\''+x.id+'\')">🗑️</button></td></tr>'}).join('')+
  '</tbody></table>'+(!h.length?'<div class="empty">Sin horas en este período</div>':'')+'</div></div>';
}

    '<div class="row"><div class="field"><label>Fecha</label><input id="rrFecha" type="date" value="'+today()+'"></div>'+
    '<div class="field"><label>Obra</label><select id="rrObra" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border)">'+
      listaObras.map(function(o){return'<option value="'+o.id+'">'+esc(o.nombre)+'</option>'}).join('')+
    '</select></div></div>'+
    '<div style="font-size:12px;font-weight:600;color:var(--muted);margin:8px 0 6px;text-transform:uppercase;letter-spacing:.5px">¿Quién trabajó? (desmarca los que no)</div>'+
    trabRows+
    '<div class="field" style="margin-top:10px"><label>Notas (opcional)</label><input id="rrNotas" placeholder="Ej: media jornada por lluvia"></div>'+
    '<button class="btn-p" style="width:100%;margin-top:6px" onclick="saveRegistroRapido()">💾 Guardar día completo</button>'+
  '</div></div>';
  openFormGeneric(html);
}

function saveRegistroRapido(){
  var fecha=document.getElementById('rrFecha').value;
  var obraId=document.getElementById('rrObra').value;
  var notas=document.getElementById('rrNotas').value;
  if(!fecha||!obraId){flash('Falta fecha u obra');return}
  var creados=0;
  D.trabs.forEach(function(t){
    var chk=document.getElementById('rr_chk_'+t.id);
    var hrsInput=document.getElementById('rr_hrs_'+t.id);
    if(chk&&chk.checked&&hrsInput){
      var horas=parseFloat(hrsInput.value)||0;
      if(horas>0){
        D.hrs.push({id:uid(),trabId:t.id,obraId:obraId,fecha:fecha,horas:horas,coste:Math.round((t.coste||0)*horas*100)/100,notas:notas});
        creados++;
      }
    }
  });
  if(!creados){flash('Ningún trabajador marcado');return}
  save();closeModal();render();
  flash('✅ '+creados+' registros creados ('+fecha+')');
}

function generarInformeHoras(){
  var periodo=document.getElementById('infPeriodo').value;
  var trabId=document.getElementById('infTrab').value;
  var rango=null,titulo='';
  if(periodo==='semana'){rango=rangoSemana();titulo='Informe semanal ('+rango[0]+' → '+rango[1]+')'}
  else if(periodo==='mes'){rango=rangoMes();titulo='Informe mensual ('+rango[0]+' → '+rango[1]+')'}
  else if(periodo==='mesAnterior'){rango=rangoMesAnterior();titulo='Informe mes anterior ('+rango[0]+' → '+rango[1]+')'}
  else{titulo='Informe completo de horas'}

  var h=[...D.hrs];
  if(rango)h=h.filter(function(x){return x.fecha>=rango[0]&&x.fecha<=rango[1]});
  if(trabId)h=h.filter(function(x){return x.trabId===trabId});
  h.sort(function(a,b){return(a.fecha||'').localeCompare(b.fecha||'')});

  if(!h.length){flash('No hay horas en ese período');return}

  // Agrupar por trabajador
  var grupos={};
  h.forEach(function(x){
    if(!grupos[x.trabId])grupos[x.trabId]=[];
    grupos[x.trabId].push(x);
  });

  var totalH=0,totalC=0;
  var cuerpo='';
  Object.keys(grupos).forEach(function(tid){
    var t=D.trabs.find(function(x){return x.id===tid});
    var nombre=t?t.nombre:'Desconocido';
    var rows=grupos[tid];
    var subH=rows.reduce(function(s,x){return s+(x.horas||0)},0);
    var subC=rows.reduce(function(s,x){return s+(x.coste||0)},0);
    totalH+=subH;totalC+=subC;
    cuerpo+='<h3 style="margin:18px 0 6px;color:#232B30;border-bottom:2px solid #948671;padding-bottom:4px">'+esc(nombre)+' — '+subH+'h · '+fmt(subC)+'€</h3>';
    cuerpo+='<table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="background:#232B30;color:#fff"><th style="padding:6px;text-align:left">Fecha</th><th style="padding:6px;text-align:left">Obra</th><th style="padding:6px;text-align:right">Horas</th><th style="padding:6px;text-align:right">Coste</th><th style="padding:6px;text-align:left">Notas</th></tr>';
    rows.forEach(function(x,i){

async function loadUsersList(){
  if(!sb||!isAdmin())return;
  try{
    var res=await sb.from('profiles').select('*').order('created_at',{ascending:true});
    if(res.data){
      _usersList=res.data;
      var tbody=document.getElementById('users-tbody');
      if(tbody&&page==='usuarios')render();
    }
  }catch(e){console.error('Error loading users:',e)}
}

function pickNuRol(btn,v){document.querySelectorAll('#nuRolPills .pill').forEach(function(b){b.classList.remove('on')});btn.classList.add('on');document.getElementById('nuRol').value=v}

function generateTempPass(){
  var chars='abcdefghjkmnpqrstuvwxyz23456789';
  var pass='';for(var i=0;i<8;i++)pass+=chars[Math.floor(Math.random()*chars.length)];
  return pass;
}

async function saveNewUser(){
  var nombre=document.getElementById('nuNombre').value.trim();
  var email=document.getElementById('nuEmail').value.trim();
  var pass=document.getElementById('nuPass').value;
  var rol=document.getElementById('nuRol').value;
  if(!nombre||!email||!pass){flash('Completa todos los campos');return}
  if(pass.length<6){flash('La contraseña debe tener al menos 6 caracteres');return}

  try{
    var res=await sb.rpc('admin_create_user',{
      p_email:email,p_password:pass,p_nombre:nombre,p_rol:rol
    });
    if(res.error){
      flash('Error: '+(res.error.message||'No se pudo crear'));
      console.error(res.error);return;
    }
    closeModal();
    flash('✅ Usuario '+nombre+' creado');
    _usersList=[];
    page='usuarios';render();
  }catch(e){flash('Error al crear usuario');console.error(e)}
}

function confirmDeleteUser(userId,userName){
  openFormGeneric('<div class="confirm"><p style="font-size:36px">⚠️</p><p>¿Eliminar al usuario <b>'+userName+'</b>?<br><span style="font-size:12px;color:var(--muted)">Se eliminará su acceso a la app</span></p>'+
    '<div class="confirm-btns"><button class="btn-o" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn-d" onclick="deleteUser(\''+userId+'\')">Eliminar</button></div></div>');
}

async function deleteUser(userId){
  try{
    var res=await sb.rpc('admin_delete_user',{p_user_id:userId});
    if(res.error){flash('Error: '+(res.error.message||'No se pudo eliminar'));return}
    closeModal();flash('Usuario eliminado');
    _usersList=_usersList.filter(function(u){return u.id!==userId});
    page='usuarios';render();
  }catch(e){flash('Error al eliminar');console.error(e)}
}

  // Dashboard: obra costs
  const obs=a.byObra.filter(o=>o.tC>0);
  mk('chartObra',{type:'bar',data:{labels:obs.map(o=>o.nombre.length>15?o.nombre.slice(0,15)+'…':o.nombre),datasets:[{label:'Material',data:obs.map(o=>+(o.tG).toFixed(2)),backgroundColor:'#3B82F6',borderRadius:4},{label:'Mano obra',data:obs.map(o=>+(o.tM).toFixed(2)),backgroundColor:'#8B5CF6',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11}}}},scales:{y:{ticks:{callback:v=>v+'€',font:{size:11}}},x:{ticks:{font:{size:10}}}}}});

  // Detail: trab hours for selected obra
  if(selObra){

    const tc=Object.entries(hbt).map(([k,v])=>({name:esc(tName(k)),...v}));
    mk('chartDetTrab',{type:'bar',data:{labels:tc.map(t=>t.name),datasets:[{label:'Horas',data:tc.map(t=>t.h),backgroundColor:'#8B5CF6',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>v+'h'}},y:{ticks:{font:{size:12,weight:'bold'}}}}}});
  }

  mk('chartEqH',{type:'bar',data:{labels:a.byTrab.map(t=>t.nombre),datasets:[{label:'Horas',data:a.byTrab.map(t=>t.tH),backgroundColor:['#3B82F6','#F59E0B','#10B981','#EF4444'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'h'}}}}});
  mk('chartEqC',{type:'doughnut',data:{labels:a.byTrab.map(t=>t.nombre),datasets:[{data:a.byTrab.map(t=>+(t.tC).toFixed(2)),backgroundColor:['#3B82F6','#F59E0B','#10B981','#EF4444']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});

// Pill helpers
function pickCat(btn,v){document.querySelectorAll('#fCatPills .pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fCat').value=v}
function pickIva(btn,v){document.querySelectorAll('#fIvaPills .pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fIva').value=v}
function pickTrab(btn,v){document.querySelectorAll('#fTrabBtns .trab-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fTrab').value=v}
function pickRol(btn,v){document.querySelectorAll('#fRolPills .pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fRol').value=v}
function stepH(d){const el=document.getElementById('fHVal');let v=parseFloat(el.textContent)+d;if(v<0.5)v=0.5;el.textContent=v}
// Save
function saveObra(){const n=document.getElementById('fNombre').value.trim().toUpperCase();if(!n)return;var fIni=document.getElementById('fFechaIni');D.obras.push({id:uid(),nombre:n,dir:document.getElementById('fDir').value,cliente:document.getElementById('fCliente').value,presupuesto:parseFloat(document.getElementById('fPresup').value)||0,estado:'Activa',fechaInicio:fIni?fIni.value:today()});save();closeModal();flash('Obra creada');render()}
function saveGasto(){const b=parseFloat(document.getElementById('fBase').value)||0;if(!b)return;const iva=parseInt(document.getElementById('fIva').value);D.gastos.push({id:uid(),obraId:document.getElementById('fObra').value,fecha:document.getElementById('fFecha').value,cat:document.getElementById('fCat').value,proveedor:document.getElementById('fProv').value,factura:document.getElementById('fFact').value,concepto:'',base:b,iva,ivaAmt:Math.round(b*iva)/100,total:Math.round(b*(100+iva))/100,pago:'Transferencia',estado:'Pagado'});save();closeModal();flash('Gasto registrado');render()}
function saveHora(){const h=parseFloat(document.getElementById('fHVal').textContent);const tId=document.getElementById('fTrab').value;if(!tId||h<=0)return;const t=D.trabs.find(x=>x.id===tId);D.hrs.push({id:uid(),trabId:tId,obraId:document.getElementById('fObra').value,fecha:document.getElementById('fHFecha').value,horas:h,coste:Math.round((t?t.coste:0)*h*100)/100,notas:document.getElementById('fNotas').value});save();closeModal();flash('Horas registradas');render()}
function saveTrab(){const n=document.getElementById('fTNom').value.trim().toUpperCase();if(!n)return;D.trabs.push({id:uid(),nombre:n,rol:document.getElementById('fRol').value,coste:parseFloat(document.getElementById('fTCoste').value)||0,jornada:parseInt(document.getElementById('fTJorn').value)||8});save();closeModal();flash('Trabajador añadido');render()}

/* ═══ DELETE ═══ */
function confirmDel(col,id){
  document.getElementById('modal-box').innerHTML=`<div class="confirm"><p style="font-size:36px">⚠️</p><p>¿Eliminar${col==='obras'?' obra y todos sus datos':''}?</p><div class="confirm-btns"><button class="btn-o" onclick="closeModal()">Cancelar</button><button class="btn-d" onclick="doDel('${col}','${id}')">Eliminar</button></div></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}
function doDel(col,id){
  D[col]=D[col].filter(x=>x.id!==id);
  if(col==='obras'){D.gastos=D.gastos.filter(g=>g.obraId!==id);D.hrs=D.hrs.filter(h=>h.obraId!==id);if(selObra===id)selObra=null}
  if(col==='trabs')D.hrs=D.hrs.filter(h=>h.trabId!==id);
  save();closeModal();flash('Eliminado');render();
}

/* ═══ PRESUPUESTOS PAGE ═══ */
var presupFiltro='todos';
function diasDesde(fecha){if(!fecha)return 0;var d=new Date(fecha);var h=new Date();return Math.floor((h-d)/(1000*60*60*24))}
function diasTexto(n){if(n===0)return'Hoy';if(n===1)return'Ayer';return'Hace '+n+' días'}

function renderPresupuestos(){
  if(!D.presupuestos)D.presupuestos=[];
  var all=[...D.presupuestos].sort(function(a,b){return(b.fecha||'').localeCompare(a.fecha||'')});
  var list;

function cambiarEstadoPresup(id,nuevoEstado){
  for(var i=0;i<D.presupuestos.length;i++){
    if(D.presupuestos[i].id===id){
      var p=D.presupuestos[i];
      var estadoAnterior=p.estado;
      p.estado=nuevoEstado;
      if(nuevoEstado==='Aprobado'||nuevoEstado==='Rechazado'){
        p.fechaRespuesta=today();
      }
      // Si se aprueba y aún no existe obra vinculada → crearla
      if((nuevoEstado==='Aprobado'||nuevoEstado==='Aceptado')&&!p.obraIdVinculada){
        var nombreObra=(p.direccion||p.direccionObra||p.descripcion||p.cliente||'PRESUPUESTO').toUpperCase();
        // Evitar duplicados: comprobar si ya hay una obra con ese nombre
        var existe=D.obras.find(function(o){return o.nombre===nombreObra});
        if(existe){
          p.obraIdVinculada=existe.id;
          flash('✅ Aprobado · vinculado a obra existente '+nombreObra);
        }else{
          var nuevaObra={
            id:uid(),
            nombre:nombreObra,
            dir:p.direccion||p.direccionObra||'',
            cliente:p.cliente||'',
            presupuesto:p.total||0,
            estado:'Activa',
            presupuestoOrigenId:id,
            fechaInicio:today()
          };
          D.obras.push(nuevaObra);
          p.obraIdVinculada=nuevaObra.id;
          flash('✅ Aprobado · Obra "'+nombreObra+'" creada automáticamente');
        }
        save();render();
        return;
      }
      break;
    }
  }
  save();render();
  var emoji=nuevoEstado==='Aprobado'?'✅':nuevoEstado==='Rechazado'?'❌':'⏳';
  flash(emoji+' Presupuesto marcado como '+nuevoEstado);
}

let _pendingImg=null;
function compressImg(file,cb){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      const MAX=900;
      if(w>MAX){h=h*MAX/w;w=MAX}
      if(h>MAX){w=w*MAX/h;h=MAX}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.6));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function handleUpload(inputId,previewId){
  const input=document.getElementById(inputId);
  const file=input.files[0];
  if(!file)return;
  compressImg(file,function(dataUrl){
    _pendingImg=dataUrl;
    const zone=document.getElementById(previewId);
    zone.classList.add('has-img');
    zone.innerHTML=`<img src="${dataUrl}"><input type="file" accept="image/*,.pdf,application/pdf">`;
  });
}

function smartUpload(file,hint){
  if(!file)return;
  var apiKey=getApiKey();
  var proc=document.createElement('div');
  proc.className='processing';
  proc.innerHTML='<div class="spinner"></div><div id="proc-msg">Leyendo documento…</div><small style="opacity:.6" id="proc-sub">Procesando archivo</small>';
  document.body.appendChild(proc);

  var name=file.name.toLowerCase();
  var isPdf=file.type==='application/pdf'||name.endsWith('.pdf');
  var isDocx=name.endsWith('.docx')||file.type==='application/vnd.openxmlformats-officedocument.wordprocessingml.document';

  if(isDocx){
    // .docx = texto real dentro, lectura 100% exacta sin OCR
    document.getElementById('proc-msg').textContent='Leyendo Word…';
    document.getElementById('proc-sub').textContent='Extrayendo texto exacto';
    leerDocx(file,hint,proc);
    return;
  }

  if(isPdf){
    document.getElementById('proc-msg').textContent='Convirtiendo PDF…';
    document.getElementById('proc-sub').textContent='Renderizando página';
    pdfToImage(file).then(function(dataUrl){
      if(apiKey){processClaude(dataUrl,apiKey,hint,proc)}
      else{processTesseract(dataUrl,hint,proc)}
    }).catch(function(err){
      console.error('PDF error:',err);
      proc.remove();
      flash('Error al leer PDF — usa el formulario manual');
      if(hint==='presupuesto')openFormPresupuesto();else openFormFactura();
    });
  }else{
    compressImg(file,function(dataUrl){
      if(apiKey){processClaude(dataUrl,apiKey,hint,proc)}
      else{processTesseract(dataUrl,hint,proc)}
    });
  }
}

/* ── Leer .docx directamente (texto exacto, sin OCR) ── */
function leerDocx(file,hint,proc){
  if(typeof mammoth==='undefined'){
    proc.remove();
    flash('Librería Word aún cargando, espera 3s y reintenta');
    return;
  }
  var reader=new FileReader();
  reader.onload=function(){
    mammoth.extractRawText({arrayBuffer:reader.result}).then(function(result){
      var text=result.value||'';
      console.log('=== DOCX TEXT ===\n'+text+'\n=== END ===');
      proc.remove();
      if(text.trim().length<5){flash('El Word está vacío o no se pudo leer');return}
      if(hint==='presupuesto'){
        var p=parseDocxPresupuesto(text);
        mostrarConfirmDocxPresup(p);
      }else{
        var g=parseOCR(text,hint);
        autoSaveGasto(g,null);
      }
    }).catch(function(err){
      proc.remove();console.error('Docx error:',err);
      flash('Error al leer el Word');
    });
  };
  reader.onerror=function(){proc.remove();flash('Error leyendo archivo')};
  reader.readAsArrayBuffer(file);
}

/* ── Parser de presupuesto desde texto de .docx ── */
function parseDocxPresupuesto(text){
  var lines=text.split('\n').map(function(l){return l.trim()}).filter(function(l){return l.length>0});
  var p={cliente:'',direccion:'',telefono:'',numero:'',subtitulo:'',descripcion:'',partidas:[],base:0,iva:21,ivaAmt:0,total:0,estado:'Pendiente',fecha:today()};

  // Buscar cliente
  for(var i=0;i<lines.length;i++){
    var L=lines[i];
    var mCli=L.match(/Cliente:\s*(.+?)(?:\s*[—–-]\s*Tel|\s*Tel|$)/i);
    if(mCli&&!p.cliente)p.cliente=mCli[1].trim();
    var mTel=L.match(/Tel[.:]*\s*([\d\s]{9,})/i);
    if(mTel&&!p.telefono)p.telefono=mTel[1].trim();
    var mDir=L.match(/Direcci[óo]n:\s*(.+)/i);
    if(mDir&&!p.direccion)p.direccion=mDir[1].trim();
    var mNum=L.match(/N[ºo°]\s*Presupuesto:\s*(\d+)/i);
    if(mNum&&!p.numero)p.numero=mNum[1].trim();
    // Subtítulo tipo "Reforma Integral"
    var mSub=L.match(/^(Reforma\s+\w+|Reparaci[óo]n[\w\s]*|Rehabilitaci[óo]n[\w\s]*)/i);
    if(mSub&&!p.subtitulo&&L.length<50)p.subtitulo=mSub[1].trim();
  }

  // Buscar partidas: "Partida N — Titulo" seguido de descripción e importe
  var partidaRe=/Partida\s+(\d+)\s*[—–-]\s*(.+)/i;
  var importeRe=/([\d.]+,\d{2})\s*€/;
  var currentPartida=null;
  var descBuffer=[];

  for(var j=0;j<lines.length;j++){
    var line=lines[j];
    var mP=line.match(partidaRe);
    if(mP){
      // Guardar la anterior
      if(currentPartida){
        currentPartida.desc=descBuffer.join(' ').trim();
        p.partidas.push(currentPartida);
      }
      currentPartida={num:mP[1],titulo:mP[2].trim(),desc:'',importe:0};
      descBuffer=[];
      // ¿El importe está en la misma línea?
      var mImp=line.match(importeRe);
      if(mImp)currentPartida.importe=parseFloat(mImp[1].replace(/\./g,'').replace(',','.'));
      continue;
    }
    if(currentPartida){
      // ¿Es un importe suelto?
      var mI=line.match(/^([\d.]+,\d{2})\s*€$/);
      if(mI&&!currentPartida.importe){
        currentPartida.importe=parseFloat(mI[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      // Base/IVA/Total → fin de partidas
      if(/Base imponible|IVA\s*\(|TOTAL/i.test(line)){
        currentPartida.desc=descBuffer.join(' ').trim();
        p.partidas.push(currentPartida);
        currentPartida=null;
        descBuffer=[];
        // seguir para capturar totales
      }else{
        // Es descripción, pero quitar el importe si viene pegado
        var cleanLine=line.replace(importeRe,'').trim();
        if(cleanLine)descBuffer.push(cleanLine);
      }
    }
    // Capturar base, iva, total (el número puede estar en la misma línea o en la siguiente)
    var nextLine=(j+1<lines.length)?lines[j+1]:'';
    function extraerNum(str){var mm=str.match(/([\d.]+,\d{2})/);return mm?parseFloat(mm[1].replace(/\./g,'').replace(',','.')):0}

    if(/Base imponible/i.test(line)){
      var v=extraerNum(line)||extraerNum(nextLine);
      if(v)p.base=v;
    }
    var mIvaLbl=line.match(/IVA\s*\((\d+)\s*%\)/i);
    if(mIvaLbl){
      p.iva=parseInt(mIvaLbl[1]);
      var vi=extraerNum(line.replace(/IVA\s*\(\d+\s*%\)/i,''))||extraerNum(nextLine);
      if(vi)p.ivaAmt=vi;
    }
    if(/^TOTAL/i.test(line)){
      var vt=extraerNum(line.replace(/TOTAL/i,''))||extraerNum(nextLine);
      if(vt)p.total=vt;
    }
  }
  // Guardar última partida si quedó abierta
  if(currentPartida){
    currentPartida.desc=descBuffer.join(' ').trim();
    p.partidas.push(currentPartida);
  }

  // Convertir partidas a formato app: "Partida N — Titulo\nDesc — importe€"
  p.partidasFmt=p.partidas.map(function(pt){

function pdfToImage(file){
  return new Promise(function(resolve,reject){
    if(typeof pdfjsLib==='undefined'){reject(new Error('PDF.js no cargado'));return}
    var reader=new FileReader();
    reader.onload=function(){
      var data=new Uint8Array(reader.result);
      var loadingTask=pdfjsLib.getDocument({data:data});
      loadingTask.promise.then(function(pdf){
        return pdf.getPage(1);
      }).then(function(pg){
        var scale=3;
        var vp=pg.getViewport({scale:scale});
        var canvas=document.createElement('canvas');
        canvas.width=vp.width;
        canvas.height=vp.height;
        var ctx=canvas.getContext('2d');
        return pg.render({canvasContext:ctx,viewport:vp}).promise.then(function(){
          resolve(canvas.toDataURL('image/png'));
        });
      }).catch(function(err){reject(err)});
    };
    reader.onerror=function(){reject(new Error('Error leyendo archivo'))};
    reader.readAsArrayBuffer(file);
  });
}

function processTesseract(dataUrl,hint,proc){
  document.getElementById('proc-msg').textContent='OCR leyendo documento…';
  document.getElementById('proc-sub').textContent='Tesseract.js — analizando';
  Tesseract.recognize(dataUrl,'spa',{
    logger:function(m){if(m.status==='recognizing text'&&m.progress){document.getElementById('proc-sub').textContent='Leyendo… '+Math.round(m.progress*100)+'%'}}
  }).then(function(result){
    proc.remove();
    var text=result.data.text||'';
    console.log('=== OCR TEXT ===\n'+text+'\n=== END ===');
    if(text.trim().length<5){flash('No se pudo leer texto');openFormGastoManual();return}
    var parsed=parseOCR(text,hint);
    console.log('=== PARSED ===',JSON.stringify(parsed,null,2));
    autoSaveGasto(parsed,dataUrl);
  }).catch(function(err){proc.remove();console.error(err);flash('Error OCR');openFormGastoManual()});
}

/* ── PARSER OCR MEJORADO — facturas españolas ── */
function parseNum(s){
  if(!s)return 0;
  s=s.toString().trim().replace(/\s/g,'');
  // "1.234,56" → quitar puntos miles, coma a punto
  if(s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.');
  return parseFloat(s)||0;
}

function findAmount(text,keywords){
  // Buscar importe en MISMA LÍNEA o SIGUIENTE LÍNEA después de una keyword
  var lines=text.split('\n');
  for(var k=0;k<keywords.length;k++){
    var kw=keywords[k].toUpperCase();
    for(var i=0;i<lines.length;i++){
      var lu=lines[i].toUpperCase();
      if(lu.indexOf(kw)>=0){
        // Buscar número en esta línea DESPUÉS de la keyword
        var afterKw=lines[i].substring(lu.indexOf(kw)+kw.length);
        var m=afterKw.match(/(\d{1,3}(?:\.\d{3})*,\d{2})/);
        if(!m)m=afterKw.match(/(\d+,\d{2})/);
        if(!m)m=afterKw.match(/(\d+\.\d{2})/);
        if(m)return parseNum(m[1]);
        // Buscar en siguiente línea
        if(i+1<lines.length){
          var nextLine=lines[i+1].trim();
          m=nextLine.match(/(\d{1,3}(?:\.\d{3})*,\d{2})/);
          if(!m)m=nextLine.match(/(\d+,\d{2})/);
          if(m)return parseNum(m[1]);
        }
      }
    }
  }
  return null;
}

function parseOCR(text,hint){
  var t=text.toUpperCase();
  var r={tipo:hint||'gasto',fecha:null,cliente:null,proveedor:null,numero:null,descripcion:'',cat:'Material',base:null,iva:null,total:null,obraId:null,estado:'Pagado',partidas:[]};

  // TIPO
  if(hint==='gasto'||t.indexOf('FACTURA')>=0||t.indexOf('FRA')>=0||t.indexOf('TICKET')>=0||t.indexOf('RECIBO')>=0||t.indexOf('ALBARAN')>=0)r.tipo='gasto';
  else if(t.indexOf('PRESUPUESTO')>=0||t.indexOf('OFERTA')>=0)r.tipo='presupuesto';

  // PROVEEDOR
  var provs=['OBRAMAT','LEROY MERLIN','SALTOKI','BRICOMART','GARPEPAR','MANAU','BASAR ORIENTAL','BASAR','AJ BCN','AJUNTAMENT','IKEA','BAUHAUS','WURTH','HILTI','MUSA EXPRESS','ROCA','BUTECH','PORCELANOSA','BIGMAT','POINT','FERRETER','CEDRIA','SIKA','WEBER','PLADUR','KNAUF'];
  for(var p=0;p<provs.length;p++){if(t.indexOf(provs[p])>=0){r.proveedor=provs[p];break}}
  if(!r.proveedor){
    var lines=text.split('\n');
    for(var li=0;li<Math.min(lines.length,6);li++){
      var line=lines[li].trim();
      if(line.length>=3&&line.length<=40&&/^[A-Z\u00C0-\u00FF\s\.,&]+$/.test(line)&&!/^(FACTURA|TICKET|RECIBO|FECHA|TOTAL|BASE|IVA|CIF|NIF)/.test(line)){
        r.proveedor=line.replace(/[,.\s]+$/,'');break;
      }
    }
  }

  // Nº FACTURA — muchos patrones
  var numRxs=[
    /(?:factura|fra\.?|fact\.?|fac)\s*(?:n[°ºo.]?\s*)?[:\s]*([A-Z0-9][\w\-\/\.]{2,25})/i,
    /(?:n[°ºo][:\s]*|num[.:\s]*|ref[.:\s]*|doc[.:\s]*|n[.:\s]+)([A-Z0-9][\w\-\/\.]{2,25})/i,
    /(?:albaran|albar[aá]n)\s*(?:n[°ºo.]?\s*)?[:\s]*([A-Z0-9][\w\-\/\.]{2,25})/i,
    /(\d{3,}-\d{4,}-\d{3,})/,
    /(F\d{4}[\w\-]{2,20})/i,
    /(\d{6,})/
  ];
  for(var ni=0;ni<numRxs.length;ni++){var nmatch=text.match(numRxs[ni]);if(nmatch){r.numero=nmatch[1].trim();break}}

  // FECHA
  var fechas=text.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/g)||[];
  for(var fi=0;fi<fechas.length;fi++){
    var fp=fechas[fi].match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
    if(fp){
      var dd=fp[1],mm=fp[2],yy=fp[3];
      if(yy.length===2)yy='20'+yy;
      if(parseInt(mm)>12){var sw=dd;dd=mm;mm=sw}
      if(parseInt(yy)>=2024&&parseInt(yy)<=2030&&parseInt(mm)>=1&&parseInt(mm)<=12&&parseInt(dd)>=1&&parseInt(dd)<=31){
        r.fecha=yy+'-'+mm.padStart(2,'0')+'-'+dd.padStart(2,'0');break;
      }
    }
  }

  // BASE IMPONIBLE — buscar en misma línea o siguiente
  r.base=findAmount(text,['BASE IMPONIBLE','BASE IMP','B. IMPONIBLE','SUBTOTAL','NETO','BASE']);

  // IVA %
  var ivaM=t.match(/IVA\s*[\(]?\s*(\d{1,2})\s*[%\)]/);
  if(ivaM)r.iva=parseInt(ivaM[1]);
  else r.iva=21;

  // TOTAL
  r.total=findAmount(text,['TOTAL FACTURA','TOTAL FRA','IMPORTE TOTAL','TOTAL A PAGAR','A PAGAR','TOTAL DOCUMENTO','TOTAL €','TOTAL:','TOTAL']);

  // Si no encontró, buscar todos los importes formato español y coger el mayor
  if(!r.total&&!r.base){
    var allAmts=[];
    var amRx=/(\d{1,3}(?:\.\d{3})*,\d{2})/g;
    var amM;while((amM=amRx.exec(text))!==null)allAmts.push(parseNum(amM[1]));
    var amRx2=/(?<!\d)(\d{2,6},\d{2})(?!\d)/g;
    while((amM=amRx2.exec(text))!==null)allAmts.push(parseNum(amM[1]));
    allAmts=allAmts.filter(function(v){return v>0.5});
    allAmts.sort(function(a,b){return b-a});
    if(allAmts.length>=1)r.total=allAmts[0];
    if(allAmts.length>=2)r.base=allAmts[1];
  }

  // Calcular lo que falte
  if(r.base&&!r.total)r.total=Math.round(r.base*(100+r.iva))/100;
  if(r.total&&!r.base)r.base=Math.round(r.total*100/(100+r.iva))/100;

  // CATEGORÍA
  if(t.indexOf('HERRAMIENTA')>=0||t.indexOf('MAQUINA')>=0||t.indexOf('ALQUILER')>=0)r.cat='Herramienta';
  else if(t.indexOf('TRANSPORT')>=0||t.indexOf('GASOIL')>=0||t.indexOf('GASOLINA')>=0||t.indexOf('COMBUSTIBLE')>=0)r.cat='Transporte';
  else if(t.indexOf('SUBCONTRAT')>=0||t.indexOf('MANO DE OBRA')>=0)r.cat='Subcontrata';

  // DESCRIPCIÓN
  var descL=text.split('\n').map(function(l){return l.trim()}).filter(function(l){
    return l.length>10&&!/^(FACTURA|FRA|TICKET|RECIBO|TOTAL|BASE|IVA|FECHA|CLIENTE|TEL|CIF|NIF|EMAIL|WWW|HTTP|IBAN|BANCO|SWIFT|FORMA.*PAGO|VENCIMIENTO|ALBARAN)/i.test(l)&&!/^\d{1,2}[\/\-]/.test(l)
  });
  if(descL.length)r.descripcion=descL.slice(0,2).join(' | ').substring(0,200);

  // VINCULAR A OBRA
  var tl=text.toLowerCase();
  for(var oi=0;oi<D.obras.length;oi++){
    var ob=D.obras[oi];
    var checks=[ob.nombre,ob.dir];if(ob.cliente&&ob.cliente!=='—')checks.push(ob.cliente);
    for(var ci=0;ci<checks.length;ci++){
      if(checks[ci].length>3&&tl.indexOf(checks[ci].toLowerCase())>=0){r.obraId=ob.id;break}
    }
    if(r.obraId)break;
  }
  return r;
}

/* ── CLAUDE API (opcional, mejor calidad) ── */
function processClaude(dataUrl,apiKey,hint,proc){
  document.getElementById('proc-msg').textContent='Claude analizando…';
  document.getElementById('proc-sub').textContent='IA — máxima precisión';
  var b64=dataUrl.split(',')[1];
  var oi=D.obras.map(function(o){return o.id+'|'+o.nombre+'|'+o.cliente+'|'+o.dir}).join('; ');
  var prompt='Analiza esta factura/ticket escaneado de Manitas Express (reformas, Barcelona). Extrae TODOS los datos. Obras: '+oi+'. SOLO JSON sin markdown: {"tipo":"gasto","fecha":"YYYY-MM-DD","proveedor":"quien emite","numero":"num factura completo","cat":"Material/Subcontrata/Herramienta/Transporte/Otro","base":0.00,"iva":21,"total":0.00,"obraId":"ID obra o null","descripcion":"concepto"}';
  if(hint==='presupuesto')prompt='Analiza este presupuesto escaneado. Extrae datos. SOLO JSON: {"tipo":"presupuesto","fecha":"YYYY-MM-DD","cliente":"","descripcion":"","total":0,"obraId":"ID o null","partidas":[]}. Obras: '+oi;
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:prompt}]}]})
  }).then(function(resp){if(!resp.ok)throw new Error(resp.status);return resp.json()})
  .then(function(data){
    proc.remove();
    var txt=(data.content||[]).map(function(c){return c.text||''}).join('');
    try{
      var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
      if(parsed.tipo==='presupuesto'){autoSaveDocument(parsed,dataUrl,hint)}
      else{autoSaveGasto(parsed,dataUrl)}
    }catch(e){flash('Error respuesta Claude');console.error(txt);openFormGastoManual()}
  }).catch(function(){
    proc.remove();flash('Error API — usando OCR');
    var p2=document.createElement('div');p2.className='processing';
    p2.innerHTML='<div class="spinner"></div><div id="proc-msg">OCR…</div><small style="opacity:.6" id="proc-sub">Tesseract.js</small>';
    document.body.appendChild(p2);processTesseract(dataUrl,hint,p2);
  });
}

function procesarPegado(){
  var raw=document.getElementById('pegarJSON').value.trim();
  if(!raw){flash('Pega el JSON primero');return}
  try{
    // Limpiar markdown si lo tiene
    raw=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    var data=JSON.parse(raw);
    // Puede ser un array de gastos o un solo gasto
    var items=Array.isArray(data)?data:[data];
    var count=0;
    for(var i=0;i<items.length;i++){
      var p=items[i];
      var base=p.base||0;
      var iva=p.iva||21;
      var total=p.total||(base?Math.round(base*(100+iva))/100:0);
      if(!base&&total)base=Math.round(total*100/(100+iva))/100;
      D.gastos.push({
        id:uid(),obraId:p.obraId||null,fecha:p.fecha||today(),
        cat:p.cat||'Material',proveedor:p.proveedor||'',
        factura:p.numero||p.factura||'',concepto:p.concepto||p.descripcion||'',
        base:base,iva:iva,ivaAmt:Math.round(base*iva)/100,total:total,
        pago:p.pago||'Transferencia',estado:p.estado||'Pagado',imagen:null
      });
      count++;
    }
    save();closeModal();page='gastos';render();
    flash('✅ '+count+' gasto'+(count>1?'s':'')+' importado'+(count>1?'s':''));
  }catch(e){
    console.error('Parse error:',e);
    flash('Error: el texto no es JSON válido');
  }
}

function autoSaveGasto(p,imgUrl){
  var base=p.base||0;
  var iva=p.iva||21;
  var total=p.total||(base?Math.round(base*(100+iva))/100:0);
  if(!base&&total)base=Math.round(total*100/(100+iva))/100;
  var cat=p.cat||'Material';
  if(['Material','Subcontrata','Herramienta','Transporte','Otro'].indexOf(cat)<0)cat='Material';
  var obraId=p.obraId||null;
  if(!obraId&&D.obras.length>0){
    var activas=D.obras.filter(function(o){return o.estado==='Activa'});
    if(activas.length===1)obraId=activas[0].id;
  }
  D.gastos.push({
    id:uid(),obraId:obraId,fecha:p.fecha||today(),cat:cat,
    proveedor:p.proveedor||'',factura:p.numero||'',concepto:p.descripcion||'',
    base:base,iva:iva,ivaAmt:Math.round(base*iva)/100,total:total,
    pago:'Transferencia',estado:'Pagado',imagen:imgUrl||null
  });
  save();page='gastos';render();
  var msg='🧾 '+(p.proveedor||'Gasto');
  if(p.numero)msg+=' | Nº '+p.numero;
  if(total)msg+=' | '+fmt(total)+'€';
  if(obraId)msg+=' → '+esc(oName(obraId));
  flash(msg);
}

function cerrarChat(){

function addChatMsg(role,text){
  _chatMessages.push({role:role,content:text});

  if(!cont)return;
  var bubble=document.createElement('div');
  var isUser=role==='user';

  var cont=document.getElementById('chatMsgs');
  if(!cont)return;
  var t=document.createElement('div');
  t.id='chatTyping';
  t.style.cssText='align-self:flex-start;background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px 14px;font-size:14px;color:var(--muted)';

function removeChatTyping(){
  var t=document.getElementById('chatTyping');
  if(t)t.remove();
}

async function enviarChatMsg(){
  var input=document.getElementById('chatInput');
  if(!input)return;
  var text=input.value.trim();
  if(!text)return;
  input.value='';
  input.style.height='auto';
  addChatMsg('user',text);
  showChatTyping();
  try{
    var reply=await llamarClaudeChat(_chatMessages);
    removeChatTyping();
    // Detectar si Claude ha devuelto JSON del presupuesto
    var jsonMatch=reply.match(/```json\s*([\s\S]*?)\s*```/);
    if(jsonMatch){
      var jsonStr=jsonMatch[1];
      var textoAntes=reply.substring(0,reply.indexOf('```json')).trim();
      if(textoAntes)addChatMsg('assistant',textoAntes);
      mostrarPresupuestoParaConfirmar(jsonStr);
    }else{
      addChatMsg('assistant',reply);
    }
  }catch(e){
    removeChatTyping();
    addChatMsg('assistant','⚠️ Error de conexión: '+(e.message||'no se pudo enviar'));
  }
}

async function llamarClaudeChat(messages){
  var apiKey=getApiKey();
  var systemPrompt='Eres el asistente de MANITAS EXPRESS, empresa de reformas y construcción en Sant Quirze del Vallès (Barcelona metropolitana). Estás ayudando a Enrique a crear presupuestos SOBRE LA MARCHA mientras visita casas de clientes.\n\n'+
    'FLUJO:\n'+
    '1. Pregunta por CLIENTE, DIRECCIÓN y descripción del trabajo\n'+
    '2. Haz preguntas breves para clarificar: metros cuadrados, materiales, si incluye demolición, si hay que quitar contenedor, etc.\n'+
    '3. Al final PREGUNTA el IVA: 10% (reforma vivienda particular con material <40% del total, base legal Art. 91.Uno.2.10º Ley 37/1992) o 21% (obra nueva/comercial/material >40%)\n'+
    '4. PROPÓN precios de mercado zona Barcelona 2026 para cada partida y ESPERA CONFIRMACIÓN de Enrique antes de generar el JSON final\n'+
    '5. Cuando Enrique confirme, genera el presupuesto en JSON dentro de ```json ... ```\n\n'+
    'PRECIOS DE REFERENCIA ZONA BARCELONA 2026 (SOLO ORIENTATIVOS, Enrique confirma):\n'+
    '• Alicatado baño m²: 35-50€ | Solado porcelánico m²: 35-45€\n'+
    '• Sanitario completo (bañera→plato ducha): 800-1200€ | Inodoro: 250-400€ | Lavabo: 300-500€\n'+
    '• Pintura vivienda m²: 8-12€ | Alisado paredes m²: 12-18€\n'+
    '• Instalación eléctrica punto: 60-90€ | Cuadro general: 400-700€\n'+
    '• Demolición tabique m²: 25-40€ | Retirada escombros contenedor: 250-400€\n'+
    '• Fontanería punto agua: 80-150€ | Instalación caldera: 400-600€\n'+
    '• Carpintería puerta interior: 250-400€ | Puerta blindada: 700-1200€\n'+
    '• Mano de obra oficial 1ª: 30-38€/h | Peón: 18-25€/h\n\n'+
    'ESTILO: Directo, pocas preguntas por mensaje (máximo 2-3), tono profesional pero cercano. Escribe en español.\n\n'+
    'FORMATO JSON FINAL (single-line objects, compatible con app Manitas):\n'+
    '```json\n'+
    '{"fecha":"YYYY-MM-DD","cliente":"NOMBRE","direccion":"DIRECCION COMPLETA","subtitulo":"Descripción corta tipica ej: Reforma baño · Alicatado + sanitarios","descripcion":"Resumen del trabajo","duracion":"2 a 3 días","total":NUMERO_CON_IVA,"base":NUMERO_SIN_IVA,"iva":10,"ivaAmt":NUMERO_IVA,"estado":"Pendiente","partidas":["Partida 1 — Título corto\\nDescripción técnica completa del trabajo","Partida 2 — Título corto\\nDescripción..."]}\n'+
    '```\n\n'+
    'FORMATO PARTIDAS: cada partida debe tener TÍTULO (después de "Partida N — ") + salto de línea (\\n) + DESCRIPCIÓN TÉCNICA profesional. Usa lenguaje técnico de construcción (sanear, revestir, aplicar, retirar de vía pública, etc.). No uses listas numeradas dentro de la descripción.\n\n'+
    'IMPORTANTE: El JSON se genera SOLO cuando Enrique diga "vale", "confirmo", "genera", "hazlo" o similar. Antes SOLO propones y preguntas.';

  var apiMessages=messages.map(function(m){return{role:m.role,content:m.content}});

  var res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens:2000,
      system:systemPrompt,
      messages:apiMessages
    })
  });
  if(!res.ok){
    var err=await res.text();
    throw new Error('API '+res.status+': '+err.substring(0,200));
  }
  var data=await res.json();
  var text='';
  if(data.content&&data.content.length){
    for(var i=0;i<data.content.length;i++){
      if(data.content[i].type==='text')text+=data.content[i].text;
    }
  }
  return text||'(sin respuesta)';
}

/* ── VOZ (Web Speech API) ── */
function toggleMic(){
  var btn=document.getElementById('btnMic');
  var status=document.getElementById('micStatus');
  if(_chatIsListening){
    if(_chatRecognition){try{_chatRecognition.stop()}catch(e){}}
    return;
  }
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    flash('Tu navegador no soporta reconocimiento de voz. Usa Chrome en el móvil.');
    return;
  }
  _chatRecognition=new SR();
  _chatRecognition.lang='es-ES';
  _chatRecognition.interimResults=true;
  _chatRecognition.continuous=false;
  var finalText='';
  _chatRecognition.onstart=function(){
    _chatIsListening=true;
    btn.style.background='#EF4444';
    btn.textContent='⏹';
    status.textContent='🎙️ Escuchando… habla ahora';

    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){

      if(e.results[i].isFinal)finalText+=t+' ';

    }
    var input=document.getElementById('chatInput');
    if(input)input.value=(finalText+interim).trim();

  };
  _chatRecognition.onerror=function(e){
    status.textContent='⚠️ Error: '+e.error;
    _chatIsListening=false;
    btn.style.background='var(--navy)';
    btn.textContent='🎤';
  };
  _chatRecognition.onend=function(){
    _chatIsListening=false;
    btn.style.background='var(--navy)';
    btn.textContent='🎤';
    status.textContent='';
    var input=document.getElementById('chatInput');
    if(input&&input.value.trim())setTimeout(function(){status.textContent='Pulsa ➤ para enviar o el micro para seguir'},100);
  };
  try{_chatRecognition.start()}catch(e){status.textContent='Error al iniciar micro'}
}

function b64ToUint8(b64){
  var raw=atob(b64);var arr=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
  return arr;
}

async function generarDocxPresupuesto(p){
  if(typeof docx==='undefined'){flash('Cargando librería... vuelve a intentar en 3s');return}
  var d=docx;
  var partidas=Array.isArray(p.partidas)?p.partidas:[];
  var iva=parseInt(p.iva)||10;
  var base=parseFloat(p.base)||0;
  var ivaAmt=parseFloat(p.ivaAmt)||Math.round(base*iva)/100;
  var total=parseFloat(p.total)||base+ivaAmt;
  var pago50=Math.round(total*50)/100;
  var pago25=Math.round(total*25)/100;
  var duracion=p.duracion||'';
  var subtitulo=p.subtitulo||p.descripcion||'';
  var direccion=p.direccion||p.direccionObra||'';

  // Parsear partidas: pueden venir como "Partida N — Título\nDescripcion" o string simple
  var partidasParseadas=partidas.map(function(str,idx){
    var s=String(str);
    var titulo='';var desc=s;
    var m=s.match(/^([^\n]+)\n([\s\S]+)$/);
    if(m){titulo=m[1].trim();desc=m[2].trim();}
    else{
      // Intentar por " — " o " - "
      var m2=s.split(/\s+[—–-]\s+/);
      if(m2.length>=2){titulo='Partida '+(idx+1)+' — '+m2.slice(0,-1).join(' — ');desc=m2[m2.length-1];}
      else{titulo='Partida '+(idx+1);desc=s;}
    }
    return {num:idx+1,titulo:titulo,desc:desc};
  });

  var NAVY='232B30';
  var LIGHT='F5F3EF';
  var ACCENT='948671';

  // Cabecera con logo + título
  var logoImg=new d.ImageRun({
    data:b64ToUint8(MANITAS_LOGO_B64),
    transformation:{width:110,height:110},
    type:'png'
  });

  var cabeceraTable=new d.Table({
    columnWidths:[2200,7300],
    width:{size:9500,type:d.WidthType.DXA},
    borders:{top:{style:'single',size:6,color:NAVY},bottom:{style:'single',size:6,color:NAVY},left:{style:'single',size:6,color:NAVY},right:{style:'single',size:6,color:NAVY},insideHorizontal:{style:'single',size:4,color:NAVY},insideVertical:{style:'single',size:4,color:NAVY}},
    rows:[
      new d.TableRow({children:[
        new d.TableCell({width:{size:2200,type:d.WidthType.DXA},verticalAlign:d.VerticalAlign.CENTER,children:[new d.Paragraph({alignment:d.AlignmentType.CENTER,children:[logoImg]})]}),
        new d.TableCell({width:{size:7300,type:d.WidthType.DXA},verticalAlign:d.VerticalAlign.CENTER,children:[
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{before:120,after:60},children:[new d.TextRun({text:'PRESUPUESTO DE OBRAS',bold:true,size:32,color:NAVY})]}),
          subtitulo?new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{after:100},children:[new d.TextRun({text:subtitulo,italics:true,size:22,color:'555555'})]}):new d.Paragraph({children:[]}),
          direccion?new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{after:120},children:[new d.TextRun({text:'Dirección: ',bold:true,size:20}),new d.TextRun({text:direccion,size:20})]}):new d.Paragraph({children:[]})
        ]})
      ]})
    ]
  });

  // Tabla de partidas
  var filasPartidas=[
    new d.TableRow({tableHeader:true,children:[
      new d.TableCell({width:{size:900,type:d.WidthType.DXA},shading:{type:d.ShadingType.CLEAR,fill:NAVY},children:[new d.Paragraph({alignment:d.AlignmentType.CENTER,children:[new d.TextRun({text:'Nº',bold:true,color:'FFFFFF',size:20})]})]}),
      new d.TableCell({width:{size:8600,type:d.WidthType.DXA},shading:{type:d.ShadingType.CLEAR,fill:NAVY},children:[new d.Paragraph({children:[new d.TextRun({text:'Descripción de los trabajos',bold:true,color:'FFFFFF',size:20})]})]})
    ]})
  ];

  partidasParseadas.forEach(function(pd,i){
    var shading=i%2===0?{}:{type:d.ShadingType.CLEAR,fill:LIGHT};
    filasPartidas.push(new d.TableRow({children:[
      new d.TableCell({width:{size:900,type:d.WidthType.DXA},shading:shading,children:[new d.Paragraph({alignment:d.AlignmentType.CENTER,children:[new d.TextRun({text:String(pd.num),bold:true,size:20})]})]}),
      new d.TableCell({width:{size:8600,type:d.WidthType.DXA},shading:shading,children:[
        new d.Paragraph({spacing:{before:60,after:40},children:[new d.TextRun({text:pd.titulo,bold:true,size:20})]}),
        new d.Paragraph({spacing:{after:80},children:[new d.TextRun({text:pd.desc,size:20})]})
      ]})
    ]}));
  });

  // Totales
  filasPartidas.push(new d.TableRow({children:[
    new d.TableCell({width:{size:900,type:d.WidthType.DXA},children:[new d.Paragraph({children:[]})]}),
    new d.TableCell({width:{size:8600,type:d.WidthType.DXA},shading:{type:d.ShadingType.CLEAR,fill:LIGHT},children:[
      new d.Paragraph({alignment:d.AlignmentType.RIGHT,spacing:{before:80,after:20},children:[new d.TextRun({text:'Base imponible: ',bold:true,size:22}),new d.TextRun({text:fmt(base)+' €',size:22})]})
    ]})
  ]}));
  filasPartidas.push(new d.TableRow({children:[
    new d.TableCell({width:{size:900,type:d.WidthType.DXA},children:[new d.Paragraph({children:[]})]}),
    new d.TableCell({width:{size:8600,type:d.WidthType.DXA},shading:{type:d.ShadingType.CLEAR,fill:LIGHT},children:[
      new d.Paragraph({alignment:d.AlignmentType.RIGHT,spacing:{after:20},children:[new d.TextRun({text:'IVA ('+iva+'%): ',bold:true,size:22}),new d.TextRun({text:fmt(ivaAmt)+' €',size:22})]})
    ]})
  ]}));
  filasPartidas.push(new d.TableRow({children:[
    new d.TableCell({width:{size:900,type:d.WidthType.DXA},children:[new d.Paragraph({children:[]})]}),
    new d.TableCell({width:{size:8600,type:d.WidthType.DXA},shading:{type:d.ShadingType.CLEAR,fill:NAVY},children:[
      new d.Paragraph({alignment:d.AlignmentType.RIGHT,spacing:{before:80,after:80},children:[new d.TextRun({text:'TOTAL: '+fmt(total)+' €',bold:true,size:28,color:'FFFFFF'})]})
    ]})
  ]}));

  var tablaPartidas=new d.Table({
    columnWidths:[900,8600],
    width:{size:9500,type:d.WidthType.DXA},
    borders:{top:{style:'single',size:6,color:NAVY},bottom:{style:'single',size:6,color:NAVY},left:{style:'single',size:6,color:NAVY},right:{style:'single',size:6,color:NAVY},insideHorizontal:{style:'single',size:4,color:'CCCCCC'},insideVertical:{style:'single',size:4,color:'CCCCCC'}},
    rows:filasPartidas
  });

  // Condiciones de pago
  var tablaPagos=new d.Table({
    columnWidths:[3167,3167,3166],
    width:{size:9500,type:d.WidthType.DXA},
    borders:{top:{style:'single',size:6,color:NAVY},bottom:{style:'single',size:6,color:NAVY},left:{style:'single',size:6,color:NAVY},right:{style:'single',size:6,color:NAVY},insideHorizontal:{style:'single',size:4,color:NAVY},insideVertical:{style:'single',size:4,color:NAVY}},
    rows:[
      new d.TableRow({children:[
        new d.TableCell({width:{size:3167,type:d.WidthType.DXA},shading:{type:d.ShadingType.CLEAR,fill:LIGHT},children:[
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{before:100,after:40},children:[new d.TextRun({text:'50%',bold:true,size:28,color:NAVY})]}),
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{after:40},children:[new d.TextRun({text:'Al inicio de los trabajos',size:20})]}),
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{after:100},children:[new d.TextRun({text:fmt(pago50)+' €',bold:true,size:22})]})
        ]}),
        new d.TableCell({width:{size:3167,type:d.WidthType.DXA},shading:{type:d.ShadingType.CLEAR,fill:LIGHT},children:[
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{before:100,after:40},children:[new d.TextRun({text:'25%',bold:true,size:28,color:NAVY})]}),
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{after:40},children:[new d.TextRun({text:'A mitad de los trabajos',size:20})]}),
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{after:100},children:[new d.TextRun({text:fmt(pago25)+' €',bold:true,size:22})]})
        ]}),
        new d.TableCell({width:{size:3166,type:d.WidthType.DXA},shading:{type:d.ShadingType.CLEAR,fill:LIGHT},children:[
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{before:100,after:40},children:[new d.TextRun({text:'25%',bold:true,size:28,color:NAVY})]}),
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{after:40},children:[new d.TextRun({text:'A la finalización',size:20})]}),
          new d.Paragraph({alignment:d.AlignmentType.CENTER,spacing:{after:100},children:[new d.TextRun({text:fmt(pago25)+' €',bold:true,size:22})]})
        ]})
      ]})
    ]
  });

  var textoLegal=iva===10?LEGAL_10:LEGAL_21;

  var doc=new d.Document({
    creator:'MANITAS EXPRESS',
    title:'Presupuesto - '+(p.cliente||''),
    sections:[{
      properties:{page:{margin:{top:720,right:720,bottom:720,left:720}}},
      children:[
        cabeceraTable,
        new d.Paragraph({spacing:{after:200},children:[]}),
        tablaPartidas,
        new d.Paragraph({spacing:{before:300,after:120},alignment:d.AlignmentType.CENTER,children:[
          new d.TextRun({text:'CONDICIONES DE PAGO',bold:true,size:22,color:NAVY}),
          duracion?new d.TextRun({text:' · Duración estimada de la obra: '+duracion,italics:true,size:20,color:'666666'}):new d.TextRun({text:''})
        ]}),
        tablaPagos,
        new d.Paragraph({spacing:{before:400,after:0},children:[new d.TextRun({text:textoLegal,italics:true,size:16,color:'555555'})]})
      ]
    }]
  });

  var blob=await d.Packer.toBlob(doc);
  var nombre='Presupuesto_'+((p.cliente||'sincliente').replace(/[^\w]/g,'_'))+'_'+today()+'.docx';
  saveAs(blob,nombre);
  flash('✅ Word descargado');
}


/* ═══ INIT ═══ */
// Pre-cargar datos locales para que D exista
D=load()||SEED;
if(!D.presupuestos)D.presupuestos=[];
if(!D.facturas)D.facturas=[];

// La app arranca después de autenticación
function initAppData(){
  if(!_authReady)return;
  render();
  // Cargar datos de Supabase (si hay)
  loadFromSupabase(function(val){
    if(val){
      D={obras:val.obras||[],gastos:val.gastos||[],trabs:val.trabs||[],hrs:val.hrs||[],presupuestos:val.presupuestos||[],facturas:val.facturas||[]};
      if(!D.presupuestos)D.presupuestos=[];
      if(!D.facturas)D.facturas=[];
      saveLocal();
      render();
    }else{
      // Supabase vacío → subir datos locales
      save();
    }
    startSupabaseListener();
  });
  updateUserUI();
}

// Arrancar autenticación
initAuth();
</script>
</body>
</html>
