<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manitas Express – Gestión de Obras</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
:root{--navy:#1F3D5C;--navy2:#0F1923;--accent:#F59E0B;--bg:#F1F5F9;--card:#fff;--border:#E2E8F0;--text:#1E293B;--muted:#94A3B8;--green:#16A34A;--red:#DC2626;--blue:#3B82F6;--purple:#8B5CF6;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
/* ── Sidebar ── */
.side{width:220px;background:linear-gradient(180deg,var(--navy2),#1A2B3D);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.side-logo{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.side-logo b{font-size:15px;letter-spacing:-.3px}
.side-logo small{display:block;font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.5px}
.side nav{flex:1;padding:12px 8px}
.nbtn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;border-radius:8px;cursor:pointer;font-size:13px;background:transparent;color:rgba(255,255,255,.55);text-align:left;margin-bottom:2px;font-family:inherit}
.nbtn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.nbtn.on{background:rgba(255,255,255,.12);color:#fff;font-weight:700}
.side-foot{padding:12px 8px 16px;border-top:1px solid rgba(255,255,255,.08)}
.side-foot button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-family:inherit;margin-bottom:4px}
.side-foot button:hover{background:rgba(255,255,255,.12)}
/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;padding:14px 28px;background:var(--card);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.topbar h2{font-size:18px;font-weight:700;flex:1;margin:0}
.topbar input{padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;width:180px;outline:none;background:#F8FAFC;font-family:inherit}
.btn-new{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-new:hover{opacity:.9}
.btn-back{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px}
.content{flex:1;overflow:auto;padding:20px 28px 40px}
/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:16px;overflow:hidden}
.card-h{padding:13px 20px;border-bottom:1px solid #F1F5F9;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.card-b{padding:16px 20px}
/* ── KPIs ── */
.kpis{display:grid;gap:14px;margin-bottom:20px}
.k4{grid-template-columns:repeat(4,1fr)}.k5{grid-template-columns:repeat(5,1fr)}
.kpi{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:center;gap:12px}
.kpi-i{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.kpi-v{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.kpi-l{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* ── Tables ── */
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;padding:8px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;white-space:nowrap}
th.sort{cursor:pointer}th.sort:hover{color:var(--text)}
td{padding:8px;vertical-align:middle}
thead tr{border-bottom:2px solid var(--border)}
tbody tr{border-bottom:1px solid #F8FAFC;transition:background .1s}
tbody tr:hover{background:#F8FAFC}
tfoot tr{border-top:2px solid var(--border)}
/* ── Badge ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-green{background:#dcfce7;color:var(--green)}.b-gray{background:#f1f5f9;color:#6B7280}.b-yellow{background:#fef9c3;color:#a16207}
/* ── Buttons ── */
.btn-p{width:100%;padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:var(--navy);color:#fff;font-family:inherit}
.btn-p:disabled{background:#CBD5E1;cursor:default}
.btn-o{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:#F1F5F9;color:var(--muted);font-family:inherit}
.btn-o:hover{background:var(--border)}
.btn-d{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:#FEE2E2;color:var(--red);font-family:inherit}
.btn-x{background:none;border:none;cursor:pointer;color:#CBD5E1;padding:4px;font-size:14px}
.btn-x:hover{color:var(--red)}
/* ── Forms ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;outline:none;background:#F8FAFC;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--navy)}
.row{display:flex;gap:12px}.row>div{flex:1}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:#F1F5F9;color:var(--muted)}
.pill.on{background:var(--navy);color:#fff}
.stepper{display:flex;align-items:center;gap:8px;justify-content:center}
.stepper button{width:40px;height:40px;border-radius:8px;border:none;background:#F1F5F9;font-size:20px;font-weight:700;cursor:pointer;color:var(--navy);font-family:inherit}
.stepper span{font-size:28px;font-weight:800;min-width:50px;text-align:center}
.trab-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;margin:0 6px 6px 0;background:#F1F5F9;color:var(--text)}
.trab-btn.on{background:var(--navy);color:#fff}
.total-box{border-radius:8px;padding:8px 14px;display:flex;justify-content:space-between;font-size:13px;margin-bottom:14px}
/* ── Modal ── */
.overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.35)}
.modal{position:relative;background:var(--card);border-radius:16px;width:460px;max-width:94vw;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid #F1F5F9;position:sticky;top:0;background:var(--card);z-index:1}
.modal-h span{font-size:17px;font-weight:700}
.modal-c{background:#F1F5F9;border:none;border-radius:6px;padding:6px 8px;cursor:pointer;font-size:16px}
.modal-b{padding:24px}
/* ── Confirm ── */
.confirm{background:var(--card);border-radius:16px;padding:28px;max-width:380px;width:90vw;text-align:center;position:relative}
.confirm p{font-size:15px;font-weight:600;margin:12px 0 20px}
.confirm-btns{display:flex;gap:10px}.confirm-btns>*{flex:1}
/* ── Toast ── */
.toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:300;transition:top .3s;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.toast.show{top:16px}
/* ── Grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:16px}
/* ── Chart containers ── */
.chart-box{position:relative;height:250px;width:100%}
/* ── Filters ── */
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.filters select{padding:6px 12px;border-radius:6px;border:1px solid var(--border);font-size:12px;background:#fff;font-family:inherit}
.filters .ftot{margin-left:auto;font-size:13px;color:var(--muted)}
/* ── Progress ── */
.pbar{display:flex;align-items:center;gap:6px}
.pbar-t{flex:1;height:6px;border-radius:3px;background:#F1F5F9;overflow:hidden}
.pbar-f{height:100%;border-radius:3px}
.pbar-l{font-size:11px;font-weight:600;color:var(--muted);min-width:32px;text-align:right}
.bbar{background:var(--card);border-radius:var(--radius);padding:12px 20px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:18px}
.bbar-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.bbar-track{height:10px;border-radius:5px;background:#F1F5F9;overflow:hidden}
.bbar-fill{height:100%;border-radius:5px;transition:width .5s}
/* ── Tabs ── */
.tabs{display:flex;gap:2px;margin-bottom:16px}
.tab{padding:8px 20px;border:none;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:var(--muted);font-family:inherit}
.tab.on{background:var(--card);color:var(--text);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.04)}
/* ── Misc ── */
.fw7{font-weight:700}.fw8{font-weight:800}.mut{color:var(--muted)}.sm{font-size:12px}.xs{font-size:10px}
.tr{text-align:right}.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ptr{cursor:pointer}
.grn{color:var(--green)}.rd{color:var(--red)}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mb16{margin-bottom:16px}
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px}
/* ── Upload & Images ── */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s;background:#FAFBFC}
.upload-zone:hover{border-color:var(--navy);background:#F0F4F8}
.upload-zone input{display:none}
.upload-zone p{margin:8px 0 0;font-size:13px;color:var(--muted)}
.upload-zone.has-img{border-style:solid;border-color:var(--green);padding:8px}
.upload-zone img{max-width:100%;max-height:200px;border-radius:8px;display:block;margin:0 auto}
.thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.thumb-placeholder{width:56px;height:56px;border-radius:8px;background:#F1F5F9;display:inline-flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox .lb-close{position:absolute;top:16px;right:20px;font-size:28px;color:#fff;cursor:pointer;background:rgba(0,0,0,.4);border:none;border-radius:8px;padding:4px 12px}
/* ── Doc status badges ── */
.b-blue{background:#DBEAFE;color:#2563EB}
.b-orange{background:#FEF3C7;color:#D97706}
.b-emerald{background:#D1FAE5;color:#059669}
/* ── Processing overlay ── */
.processing{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:16px;font-size:16px;font-weight:600}
.processing .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Smart upload button ── */
.smart-upload{display:flex;align-items:center;gap:12px;padding:16px 20px;background:linear-gradient(135deg,var(--navy),#2A5078);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;width:100%;margin-bottom:16px;transition:opacity .15s}
.smart-upload:hover{opacity:.9}
.smart-upload input{display:none}
.smart-upload .su-icon{font-size:28px}
.smart-upload small{font-weight:400;opacity:.7;font-size:12px;display:block;margin-top:2px}
/* ── API key banner ── */
.api-banner{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:13px;color:#92400E;display:flex;align-items:center;gap:12px}
.api-banner button{padding:6px 14px;border-radius:6px;border:none;background:var(--navy);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.avatar{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.ox{overflow-x:auto}
</style>
</head>

function save(){
  saveLocal();
  if(!sbReady||!sb)return;
  sbSkip=true;
  setSyncStatus('syncing');
  var clean=JSON.parse(JSON.stringify(D));
  (clean.gastos||[]).forEach(function(g){delete g.imagen});

  });
}

function loadFromSupabase(cb){
  if(!sbReady||!sb){cb(null);return}
  sb.from('app_data').select('data').eq('id',1).single().then(function(res){
    if(res.error||!res.data){cb(null)}
    else{cb(res.data.data)}
  });
}

function startSupabaseListener(){
  if(!sbReady||!sb)return;
  sb.channel('app-sync').on('postgres_changes',{event:'*',schema:'public',table:'app_data'},function(payload){
    if(sbSkip){sbSkip=false;return}
    var val=payload.new?payload.new.data:null;
    if(val){
      var localImgs={};
      (D.gastos||[]).forEach(function(g){if(g.imagen)localImgs[g.id]=g.imagen});
      (D.presupuestos||[]).forEach(function(p){if(p.imagen)localImgs[p.id]=p.imagen});
      D={obras:val.obras||[],gastos:val.gastos||[],trabs:val.trabs||[],hrs:val.hrs||[],presupuestos:val.presupuestos||[],facturas:val.facturas||[]};
      if(!D.presupuestos)D.presupuestos=[];
      if(!D.facturas)D.facturas=[];
      D.gastos.forEach(function(g){if(localImgs[g.id])g.imagen=localImgs[g.id]});
      D.presupuestos.forEach(function(p){if(localImgs[p.id])p.imagen=localImgs[p.id]});
      saveLocal();
      render();
      setSyncStatus('online');
    }
  }).subscribe();
}

function calc(){
  const g=D.gastos,h=D.hrs,o=D.obras,t=D.trabs;
  const tg=g.reduce((s,x)=>s+(x.total||0),0),th=h.reduce((s,x)=>s+(x.coste||0),0);
  const byObra=o.map(ob=>{const og=g.filter(x=>x.obraId===ob.id).reduce((s,x)=>s+(x.total||0),0);const oh=h.filter(x=>x.obraId===ob.id).reduce((s,x)=>s+(x.coste||0),0);const oH=h.filter(x=>x.obraId===ob.id).reduce((s,x)=>s+(x.horas||0),0);return{...ob,tG:og,tM:oh,tH:oH,tC:og+oh,margen:ob.presupuesto?ob.presupuesto-og-oh:null,pU:ob.presupuesto?pct(og+oh,ob.presupuesto):null}});
  const pm={};g.forEach(x=>{const k=(x.proveedor||'SIN').toUpperCase();pm[k]=(pm[k]||0)+(x.total||0)});
  const byProv=Object.entries(pm).map(([k,v])=>({name:k,total:v})).sort((a,b)=>b.total-a.total);
  const byTrab=t.map(tr=>{const w=h.filter(x=>x.trabId===tr.id);return{...tr,tH:w.reduce((s,x)=>s+(x.horas||0),0),tC:w.reduce((s,x)=>s+(x.coste||0),0),dias:[...new Set(w.map(x=>x.fecha))].length}});
  return{tg,th,total:tg+th,activas:o.filter(x=>x.estado==='Activa').length,byObra,byProv,byTrab};
}

  const tH=h.reduce((s,x)=>s+(x.horas||0),0),tC=h.reduce((s,x)=>s+(x.coste||0),0);
  return`<div class="filters"><span class="ftot">${tH}h · Coste: <b>${fmt(tC)}€</b></span></div>

  ${h.map(x=>`<tr><td>${x.fecha}</td><td class="mut ell" style="max-width:140px">${oName(x.obraId)}</td><td class="fw7">${tName(x.trabId)}</td><td class="fw7">${x.horas}h</td><td>${fmt(x.coste)}€</td><td class="mut sm ell" style="max-width:200px">${x.notas||'—'}</td><td><button class="btn-x" onclick="confirmDel('hrs','${x.id}')">🗑️</button></td></tr>`).join('')}

/* ═══ CHARTS ═══ */
function initCharts(a){
  if(!a)a=calc();
  const mk=(id,cfg)=>{const el=document.getElementById(id);if(!el)return;charts.push(new Chart(el,cfg))};
  // Dashboard: obra costs
  const obs=a.byObra.filter(o=>o.tC>0);
  mk('chartObra',{type:'bar',data:{labels:obs.map(o=>o.nombre.length>15?o.nombre.slice(0,15)+'…':o.nombre),datasets:[{label:'Material',data:obs.map(o=>+(o.tG).toFixed(2)),backgroundColor:'#3B82F6',borderRadius:4},{label:'Mano obra',data:obs.map(o=>+(o.tM).toFixed(2)),backgroundColor:'#8B5CF6',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11}}}},scales:{y:{ticks:{callback:v=>v+'€',font:{size:11}}},x:{ticks:{font:{size:10}}}}}});
  // Dashboard: trab hours
  mk('chartTrab',{type:'bar',data:{labels:a.byTrab.map(t=>t.nombre),datasets:[{label:'Horas',data:a.byTrab.map(t=>t.tH),backgroundColor:'#8B5CF6',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>v+'h',font:{size:11}}},y:{ticks:{font:{size:12,weight:'bold'}}}}}});
  // Detail: trab hours for selected obra
  if(selObra){
    const hbt={};D.hrs.filter(h=>h.obraId===selObra).forEach(h=>{if(!hbt[h.trabId])hbt[h.trabId]={h:0,c:0};hbt[h.trabId].h+=h.horas||0;hbt[h.trabId].c+=h.coste||0});
    const tc=Object.entries(hbt).map(([k,v])=>({name:tName(k),...v}));
    mk('chartDetTrab',{type:'bar',data:{labels:tc.map(t=>t.name),datasets:[{label:'Horas',data:tc.map(t=>t.h),backgroundColor:'#8B5CF6',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>v+'h'}},y:{ticks:{font:{size:12,weight:'bold'}}}}}});
  }
  // Equipo charts
  mk('chartEqH',{type:'bar',data:{labels:a.byTrab.map(t=>t.nombre),datasets:[{label:'Horas',data:a.byTrab.map(t=>t.tH),backgroundColor:['#3B82F6','#F59E0B','#10B981','#EF4444'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'h'}}}}});
  mk('chartEqC',{type:'doughnut',data:{labels:a.byTrab.map(t=>t.nombre),datasets:[{data:a.byTrab.map(t=>+(t.tC).toFixed(2)),backgroundColor:['#3B82F6','#F59E0B','#10B981','#EF4444']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
}

    <div class="field"><label>Obra</label><select id="fObra">${D.obras.map(o=>`<option value="${o.id}"${o.id===selObra?' selected':''}>${o.nombre}</option>`).join('')}</select></div>
    <div class="field"><label>Categoría</label><div class="pills" id="fCatPills">${CATS.map((c,i)=>`<button class="pill${i===0?' on':''}" onclick="pickCat(this,'${c.key}')">${c.em} ${c.key}</button>`).join('')}</div><input type="hidden" id="fCat" value="Material"></div>

  else if(type==='hora')html=`<div class="modal"><div class="modal-h"><span>Registrar horas</span><button class="modal-c" onclick="closeModal()">✕</button></div><div class="modal-b">
    <div class="field"><label>Obra</label><select id="fObra">${D.obras.map(o=>`<option value="${o.id}"${o.id===selObra?' selected':''}>${o.nombre}</option>`).join('')}</select></div>
    <div class="field"><label>Trabajador</label><div id="fTrabBtns">${D.trabs.map((t,i)=>`<button class="trab-btn${i===0?' on':''}" onclick="pickTrab(this,'${t.id}')">${t.nombre}</button>`).join('')}</div><input type="hidden" id="fTrab" value="${D.trabs[0]?D.trabs[0].id:''}"></div>

    <div class="field"><label>Notas</label><input id="fNotas" placeholder="Opcional"></div>

function closeModal(){document.getElementById('modal-overlay').classList.remove('show')}
// Pill helpers
function pickCat(btn,v){document.querySelectorAll('#fCatPills .pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fCat').value=v}
function pickIva(btn,v){document.querySelectorAll('#fIvaPills .pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fIva').value=v}
function pickTrab(btn,v){document.querySelectorAll('#fTrabBtns .trab-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fTrab').value=v}
function pickRol(btn,v){document.querySelectorAll('#fRolPills .pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fRol').value=v}
function stepH(d){const el=document.getElementById('fHVal');let v=parseFloat(el.textContent)+d;if(v<0.5)v=0.5;el.textContent=v}
// Save
function saveObra(){const n=document.getElementById('fNombre').value.trim().toUpperCase();if(!n)return;D.obras.push({id:uid(),nombre:n,dir:document.getElementById('fDir').value,cliente:document.getElementById('fCliente').value,presupuesto:parseFloat(document.getElementById('fPresup').value)||0,estado:'Activa'});save();closeModal();flash('Obra creada');render()}
function saveGasto(){const b=parseFloat(document.getElementById('fBase').value)||0;if(!b)return;const iva=parseInt(document.getElementById('fIva').value);D.gastos.push({id:uid(),obraId:document.getElementById('fObra').value,fecha:document.getElementById('fFecha').value,cat:document.getElementById('fCat').value,proveedor:document.getElementById('fProv').value,factura:document.getElementById('fFact').value,concepto:'',base:b,iva,ivaAmt:Math.round(b*iva)/100,total:Math.round(b*(100+iva))/100,pago:'Transferencia',estado:'Pagado'});save();closeModal();flash('Gasto registrado');render()}
function saveHora(){const h=parseFloat(document.getElementById('fHVal').textContent);const tId=document.getElementById('fTrab').value;if(!tId||h<=0)return;const t=D.trabs.find(x=>x.id===tId);D.hrs.push({id:uid(),trabId:tId,obraId:document.getElementById('fObra').value,fecha:document.getElementById('fHFecha').value,horas:h,coste:Math.round((t?t.coste:0)*h*100)/100,notas:document.getElementById('fNotas').value});save();closeModal();flash('Horas registradas');render()}
function saveTrab(){const n=document.getElementById('fTNom').value.trim().toUpperCase();if(!n)return;D.trabs.push({id:uid(),nombre:n,rol:document.getElementById('fRol').value,coste:parseFloat(document.getElementById('fTCoste').value)||0,jornada:parseInt(document.getElementById('fTJorn').value)||8});save();closeModal();flash('Trabajador añadido');render()}

/* ═══ DELETE ═══ */
function confirmDel(col,id){
  document.getElementById('modal-box').innerHTML=`<div class="confirm"><p style="font-size:36px">⚠️</p><p>¿Eliminar${col==='obras'?' obra y todos sus datos':''}?</p><div class="confirm-btns"><button class="btn-o" onclick="closeModal()">Cancelar</button><button class="btn-d" onclick="doDel('${col}','${id}')">Eliminar</button></div></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}
function doDel(col,id){
  D[col]=D[col].filter(x=>x.id!==id);
  if(col==='obras'){D.gastos=D.gastos.filter(g=>g.obraId!==id);D.hrs=D.hrs.filter(h=>h.obraId!==id);if(selObra===id)selObra=null}
  if(col==='trabs')D.hrs=D.hrs.filter(h=>h.trabId!==id);
  save();closeModal();flash('Eliminado');render();
}

/* ═══ PRESUPUESTOS PAGE ═══ */
var presupFiltro='todos';
function diasDesde(fecha){if(!fecha)return 0;var d=new Date(fecha);var h=new Date();return Math.floor((h-d)/(1000*60*60*24))}
function diasTexto(n){if(n===0)return'Hoy';if(n===1)return'Ayer';return'Hace '+n+' días'}

function renderPresupuestos(){
  if(!D.presupuestos)D.presupuestos=[];
  var all=[...D.presupuestos].sort(function(a,b){return(b.fecha||'').localeCompare(a.fecha||'')});
  var list=presupFiltro==='todos'?all:all.filter(function(p){return p.estado===presupFiltro});
  var total=list.reduce(function(s,x){return s+(x.total||0)},0);

  // Contadores
  var nPend=all.filter(function(p){return p.estado==='Pendiente'||p.estado==='Enviado'||!p.estado||p.estado==='Borrador'}).length;
  var nApro=all.filter(function(p){return p.estado==='Aprobado'||p.estado==='Aceptado'}).length;
  var nRech=all.filter(function(p){return p.estado==='Rechazado'}).length;

  return'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">'+
    '<button class="smart-upload" onclick="this.querySelector(\'input\').click()" style="margin:0"><span class="su-icon">📷</span><div>Subir presupuesto (OCR)<small>Lee automático</small></div><input type="file" accept="image/*,.pdf,application/pdf" onchange="smartUpload(this.files[0],\'presupuesto\')"></button>'+
    '<button class="smart-upload" style="margin:0;background:linear-gradient(135deg,#7C3AED,#A855F7)" onclick="openPegarPresupuesto()"><span class="su-icon">📋</span><div>Pegar desde Claude<small>100% preciso</small></div></button></div>'+

  '<div class="kpis k4" style="margin-bottom:16px">'+
    '<div class="kpi ptr" onclick="presupFiltro=\'todos\';render()" style="'+(presupFiltro==='todos'?'outline:2px solid var(--navy)':'')+'"><div class="kpi-i" style="background:#3B82F614">📝</div><div><div class="kpi-v">'+all.length+'</div><div class="kpi-l">Total</div></div></div>'+
    '<div class="kpi ptr" onclick="presupFiltro=\'Pendiente\';render()" style="'+(presupFiltro==='Pendiente'?'outline:2px solid #F59E0B':'')+'"><div class="kpi-i" style="background:#F59E0B14">⏳</div><div><div class="kpi-v">'+nPend+'</div><div class="kpi-l">Pendientes</div></div></div>'+
    '<div class="kpi ptr" onclick="presupFiltro=\'Aprobado\';render()" style="'+(presupFiltro==='Aprobado'?'outline:2px solid #16A34A':'')+'"><div class="kpi-i" style="background:#16A34A14">✅</div><div><div class="kpi-v">'+nApro+'</div><div class="kpi-l">Aprobados</div></div></div>'+
    '<div class="kpi ptr" onclick="presupFiltro=\'Rechazado\';render()" style="'+(presupFiltro==='Rechazado'?'outline:2px solid #EF4444':'')+'"><div class="kpi-i" style="background:#EF444414">❌</div><div><div class="kpi-v">'+nRech+'</div><div class="kpi-l">Rechazados</div></div></div>'+
  '</div>'+

  '<div class="filters"><span class="ftot">'+list.length+' presupuestos · Total: <b>'+fmt(total)+'€</b></span></div>'+
  '<div class="card"><div class="card-b ox"><table style="min-width:900px"><thead><tr><th>Doc</th><th>Fecha</th><th>Cliente</th><th>Descripción</th><th>Total</th><th>Estado</th><th>Tiempo</th><th>Enviar</th><th></th></tr></thead><tbody>'+
  list.map(function(p){
    var dias=diasDesde(p.fechaEnvio||p.fecha);
    var estado=p.estado||'Pendiente';
    var isPend=estado==='Pendiente'||estado==='Enviado'||estado==='Borrador'||!estado;
    var badgeCls=estado==='Aprobado'||estado==='Aceptado'?'b-green':estado==='Rechazado'?'b-gray':isPend?'b-yellow':'b-blue';
    var diasColor=isPend?(dias>14?'color:#EF4444;font-weight:700':dias>7?'color:#F59E0B;font-weight:700':'color:var(--muted)'):'color:var(--muted)';
    return'<tr>'+
      '<td>'+(p.imagen?'<img src="'+p.imagen+'" class="thumb" onclick="openLB(\''+p.id+'\',\'presupuestos\')">':'<div class="thumb-placeholder">📝</div>')+'</td>'+
      '<td>'+(p.fecha||'—')+'</td>'+
      '<td class="fw7">'+(p.cliente||'—')+'</td>'+
      '<td class="ell" style="max-width:180px">'+(p.descripcion||'—')+'</td>'+
      '<td class="fw7">'+(p.total?fmt(p.total)+'€':'—')+'</td>'+
      '<td><select onchange="cambiarEstadoPresup(\''+p.id+'\',this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-weight:600;background:#fff;font-family:inherit">'+
        '<option value="Pendiente"'+(isPend?' selected':'')+'>⏳ Pendiente</option>'+
        '<option value="Aprobado"'+(estado==='Aprobado'||estado==='Aceptado'?' selected':'')+'>✅ Aprobado</option>'+
        '<option value="Rechazado"'+(estado==='Rechazado'?' selected':'')+'>❌ Rechazado</option>'+
      '</select></td>'+
      '<td style="'+diasColor+';font-size:12px;white-space:nowrap">'+(isPend?diasTexto(dias):(p.fechaRespuesta||'—'))+'</td>'+
      '<td><button class="btn-o" style="padding:4px 10px;font-size:11px" onclick="enviarPresup(\''+p.id+'\')">📧</button></td>'+
      '<td><button class="btn-x" onclick="confirmDel(\'presupuestos\',\''+p.id+'\')">🗑️</button></td>'+
    '</tr>';
  }).join('')+
  '</tbody></table>'+(list.length===0?'<div class="empty">Sin presupuestos con este filtro.</div>':'')+'</div></div>';
}

function cambiarEstadoPresup(id,nuevoEstado){
  for(var i=0;i<D.presupuestos.length;i++){
    if(D.presupuestos[i].id===id){
      D.presupuestos[i].estado=nuevoEstado;
      if(nuevoEstado==='Aprobado'||nuevoEstado==='Rechazado'){
        D.presupuestos[i].fechaRespuesta=today();
      }
      break;
    }
  }
  save();render();
  var emoji=nuevoEstado==='Aprobado'?'✅':nuevoEstado==='Rechazado'?'❌':'⏳';
  flash(emoji+' Presupuesto marcado como '+nuevoEstado);
}

function enviarPresup(id){
  var p=D.presupuestos.find(function(x){return x.id===id});
  if(!p)return;
  var email=p.emailCliente||'';
  if(!email){
    email=prompt('Email del cliente:');
    if(!email)return;
    p.emailCliente=email;
    if(!p.fechaEnvio)p.fechaEnvio=today();
    if(p.estado==='Borrador'||!p.estado)p.estado='Pendiente';
    save();render();
  }
  var asunto='Presupuesto Manitas Express — '+(p.descripcion||'Obra').substring(0,50);
  var partidas=(p.partidas||[]).map(function(x,i){return'  '+(i+1)+'. '+x}).join('\n');
  var cuerpo='Estimado/a '+(p.cliente||'cliente')+',\n\n'+
    'Le enviamos el presupuesto solicitado para los trabajos descritos a continuación:\n\n'+
    'Concepto: '+(p.descripcion||'—')+'\n\n'+
    (partidas?'Detalle de partidas:\n'+partidas+'\n\n':'')+
    'Total: '+(p.total?fmt(p.total)+' € (IVA 21% incluido)':'Pendiente de definir')+'\n\n'+
    'Condiciones de pago:\n'+
    '  • 50% al inicio de los trabajos\n'+
    '  • 25% a mitad de los trabajos\n'+
    '  • 25% a la finalización\n\n'+
    'Quedamos a su disposición para cualquier consulta o aclaración.\n\n'+
    'Un cordial saludo,\n'+
    'Manitas Express\n'+
    'Tel: 690 740 846\n'+
    'info@manitasexpress.es';
  // Abrir Gmail directamente
  var gmailUrl='https://mail.google.com/mail/?view=cm&fs=1'+
    '&to='+encodeURIComponent(email)+
    '&su='+encodeURIComponent(asunto)+
    '&body='+encodeURIComponent(cuerpo);
  window.open(gmailUrl,'_blank');
  if(!p.fechaEnvio){p.fechaEnvio=today();save();render()}
  flash('📧 Gmail abierto — solo pulsa Enviar');
}

/* ═══ FACTURAS PAGE ═══ */
function renderFacturas(){
  if(!D.facturas)D.facturas=[];
  const list=[...D.facturas].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  const total=list.reduce((s,x)=>s+(x.total||0),0);

/* ═══ IMAGE COMPRESSION ═══ */
let _pendingImg=null;
function compressImg(file,cb){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      const MAX=900;
      if(w>MAX){h=h*MAX/w;w=MAX}
      if(h>MAX){w=w*MAX/h;h=MAX}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.6));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function handleUpload(inputId,previewId){
  const input=document.getElementById(inputId);
  const file=input.files[0];
  if(!file)return;
  compressImg(file,function(dataUrl){
    _pendingImg=dataUrl;
    const zone=document.getElementById(previewId);
    zone.classList.add('has-img');
    zone.innerHTML=`<img src="${dataUrl}"><input type="file" accept="image/*,.pdf,application/pdf">`;
  });
}

// PDF.js: configurar worker
try{if(typeof pdfjsLib!=='undefined'){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}}catch(e){}

function smartUpload(file,hint){
  if(!file)return;
  var apiKey=getApiKey();
  var proc=document.createElement('div');
  proc.className='processing';
  proc.innerHTML='<div class="spinner"></div><div id="proc-msg">Leyendo documento…</div><small style="opacity:.6" id="proc-sub">Procesando archivo</small>';
  document.body.appendChild(proc);

  var isPdf=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');

  if(isPdf){
    document.getElementById('proc-msg').textContent='Convirtiendo PDF…';
    document.getElementById('proc-sub').textContent='Renderizando página';
    pdfToImage(file).then(function(dataUrl){
      if(apiKey){processClaude(dataUrl,apiKey,hint,proc)}
      else{processTesseract(dataUrl,hint,proc)}
    }).catch(function(err){
      console.error('PDF error:',err);
      proc.remove();
      flash('Error al leer PDF — usa el formulario manual');
      if(hint==='presupuesto')openFormPresupuesto();else openFormFactura();
    });
  }else{
    compressImg(file,function(dataUrl){
      if(apiKey){processClaude(dataUrl,apiKey,hint,proc)}
      else{processTesseract(dataUrl,hint,proc)}
    });
  }
}

function pdfToImage(file){
  return new Promise(function(resolve,reject){
    if(typeof pdfjsLib==='undefined'){reject(new Error('PDF.js no cargado'));return}
    var reader=new FileReader();
    reader.onload=function(){
      var data=new Uint8Array(reader.result);
      var loadingTask=pdfjsLib.getDocument({data:data});
      loadingTask.promise.then(function(pdf){
        return pdf.getPage(1);
      }).then(function(pg){
        var scale=3;
        var vp=pg.getViewport({scale:scale});
        var canvas=document.createElement('canvas');
        canvas.width=vp.width;
        canvas.height=vp.height;
        var ctx=canvas.getContext('2d');
        return pg.render({canvasContext:ctx,viewport:vp}).promise.then(function(){
          resolve(canvas.toDataURL('image/png'));
        });
      }).catch(function(err){reject(err)});
    };
    reader.onerror=function(){reject(new Error('Error leyendo archivo'))};
    reader.readAsArrayBuffer(file);
  });
}

function processTesseract(dataUrl,hint,proc){
  document.getElementById('proc-msg').textContent='OCR leyendo documento…';
  document.getElementById('proc-sub').textContent='Tesseract.js — analizando';
  Tesseract.recognize(dataUrl,'spa',{
    logger:function(m){if(m.status==='recognizing text'&&m.progress){document.getElementById('proc-sub').textContent='Leyendo… '+Math.round(m.progress*100)+'%'}}
  }).then(function(result){
    proc.remove();
    var text=result.data.text||'';
    console.log('=== OCR TEXT ===\n'+text+'\n=== END ===');
    if(text.trim().length<5){flash('No se pudo leer texto');openFormGastoManual();return}
    var parsed=parseOCR(text,hint);
    console.log('=== PARSED ===',JSON.stringify(parsed,null,2));
    autoSaveGasto(parsed,dataUrl);
  }).catch(function(err){proc.remove();console.error(err);flash('Error OCR');openFormGastoManual()});
}

/* ── PARSER OCR MEJORADO — facturas españolas ── */
function parseNum(s){
  if(!s)return 0;
  s=s.toString().trim().replace(/\s/g,'');
  // "1.234,56" → quitar puntos miles, coma a punto
  if(s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.');
  return parseFloat(s)||0;
}

function findAmount(text,keywords){
  // Buscar importe en MISMA LÍNEA o SIGUIENTE LÍNEA después de una keyword
  var lines=text.split('\n');
  for(var k=0;k<keywords.length;k++){
    var kw=keywords[k].toUpperCase();
    for(var i=0;i<lines.length;i++){
      var lu=lines[i].toUpperCase();
      if(lu.indexOf(kw)>=0){
        // Buscar número en esta línea DESPUÉS de la keyword
        var afterKw=lines[i].substring(lu.indexOf(kw)+kw.length);
        var m=afterKw.match(/(\d{1,3}(?:\.\d{3})*,\d{2})/);
        if(!m)m=afterKw.match(/(\d+,\d{2})/);
        if(!m)m=afterKw.match(/(\d+\.\d{2})/);
        if(m)return parseNum(m[1]);
        // Buscar en siguiente línea
        if(i+1<lines.length){
          var nextLine=lines[i+1].trim();
          m=nextLine.match(/(\d{1,3}(?:\.\d{3})*,\d{2})/);
          if(!m)m=nextLine.match(/(\d+,\d{2})/);
          if(m)return parseNum(m[1]);
        }
      }
    }
  }
  return null;
}

function parseOCR(text,hint){
  var t=text.toUpperCase();
  var r={tipo:hint||'gasto',fecha:null,cliente:null,proveedor:null,numero:null,descripcion:'',cat:'Material',base:null,iva:null,total:null,obraId:null,estado:'Pagado',partidas:[]};

  // TIPO
  if(hint==='gasto'||t.indexOf('FACTURA')>=0||t.indexOf('FRA')>=0||t.indexOf('TICKET')>=0||t.indexOf('RECIBO')>=0||t.indexOf('ALBARAN')>=0)r.tipo='gasto';
  else if(t.indexOf('PRESUPUESTO')>=0||t.indexOf('OFERTA')>=0)r.tipo='presupuesto';

  // PROVEEDOR
  var provs=['OBRAMAT','LEROY MERLIN','SALTOKI','BRICOMART','GARPEPAR','MANAU','BASAR ORIENTAL','BASAR','AJ BCN','AJUNTAMENT','IKEA','BAUHAUS','WURTH','HILTI','MUSA EXPRESS','ROCA','BUTECH','PORCELANOSA','BIGMAT','POINT','FERRETER','CEDRIA','SIKA','WEBER','PLADUR','KNAUF'];
  for(var p=0;p<provs.length;p++){if(t.indexOf(provs[p])>=0){r.proveedor=provs[p];break}}
  if(!r.proveedor){
    var lines=text.split('\n');
    for(var li=0;li<Math.min(lines.length,6);li++){
      var line=lines[li].trim();
      if(line.length>=3&&line.length<=40&&/^[A-Z\u00C0-\u00FF\s\.,&]+$/.test(line)&&!/^(FACTURA|TICKET|RECIBO|FECHA|TOTAL|BASE|IVA|CIF|NIF)/.test(line)){
        r.proveedor=line.replace(/[,.\s]+$/,'');break;
      }
    }
  }

  // Nº FACTURA — muchos patrones
  var numRxs=[
    /(?:factura|fra\.?|fact\.?|fac)\s*(?:n[°ºo.]?\s*)?[:\s]*([A-Z0-9][\w\-\/\.]{2,25})/i,
    /(?:n[°ºo][:\s]*|num[.:\s]*|ref[.:\s]*|doc[.:\s]*|n[.:\s]+)([A-Z0-9][\w\-\/\.]{2,25})/i,
    /(?:albaran|albar[aá]n)\s*(?:n[°ºo.]?\s*)?[:\s]*([A-Z0-9][\w\-\/\.]{2,25})/i,
    /(\d{3,}-\d{4,}-\d{3,})/,
    /(F\d{4}[\w\-]{2,20})/i,
    /(\d{6,})/
  ];
  for(var ni=0;ni<numRxs.length;ni++){var nmatch=text.match(numRxs[ni]);if(nmatch){r.numero=nmatch[1].trim();break}}

  // FECHA
  var fechas=text.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/g)||[];
  for(var fi=0;fi<fechas.length;fi++){
    var fp=fechas[fi].match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
    if(fp){
      var dd=fp[1],mm=fp[2],yy=fp[3];
      if(yy.length===2)yy='20'+yy;
      if(parseInt(mm)>12){var sw=dd;dd=mm;mm=sw}
      if(parseInt(yy)>=2024&&parseInt(yy)<=2030&&parseInt(mm)>=1&&parseInt(mm)<=12&&parseInt(dd)>=1&&parseInt(dd)<=31){
        r.fecha=yy+'-'+mm.padStart(2,'0')+'-'+dd.padStart(2,'0');break;
      }
    }
  }

  // BASE IMPONIBLE — buscar en misma línea o siguiente
  r.base=findAmount(text,['BASE IMPONIBLE','BASE IMP','B. IMPONIBLE','SUBTOTAL','NETO','BASE']);

  // IVA %
  var ivaM=t.match(/IVA\s*[\(]?\s*(\d{1,2})\s*[%\)]/);
  if(ivaM)r.iva=parseInt(ivaM[1]);
  else r.iva=21;

  // TOTAL
  r.total=findAmount(text,['TOTAL FACTURA','TOTAL FRA','IMPORTE TOTAL','TOTAL A PAGAR','A PAGAR','TOTAL DOCUMENTO','TOTAL €','TOTAL:','TOTAL']);

  // Si no encontró, buscar todos los importes formato español y coger el mayor
  if(!r.total&&!r.base){
    var allAmts=[];
    var amRx=/(\d{1,3}(?:\.\d{3})*,\d{2})/g;
    var amM;while((amM=amRx.exec(text))!==null)allAmts.push(parseNum(amM[1]));
    var amRx2=/(?<!\d)(\d{2,6},\d{2})(?!\d)/g;
    while((amM=amRx2.exec(text))!==null)allAmts.push(parseNum(amM[1]));
    allAmts=allAmts.filter(function(v){return v>0.5});
    allAmts.sort(function(a,b){return b-a});
    if(allAmts.length>=1)r.total=allAmts[0];
    if(allAmts.length>=2)r.base=allAmts[1];
  }

  // Calcular lo que falte
  if(r.base&&!r.total)r.total=Math.round(r.base*(100+r.iva))/100;
  if(r.total&&!r.base)r.base=Math.round(r.total*100/(100+r.iva))/100;

  // CATEGORÍA
  if(t.indexOf('HERRAMIENTA')>=0||t.indexOf('MAQUINA')>=0||t.indexOf('ALQUILER')>=0)r.cat='Herramienta';
  else if(t.indexOf('TRANSPORT')>=0||t.indexOf('GASOIL')>=0||t.indexOf('GASOLINA')>=0||t.indexOf('COMBUSTIBLE')>=0)r.cat='Transporte';
  else if(t.indexOf('SUBCONTRAT')>=0||t.indexOf('MANO DE OBRA')>=0)r.cat='Subcontrata';

  // DESCRIPCIÓN
  var descL=text.split('\n').map(function(l){return l.trim()}).filter(function(l){
    return l.length>10&&!/^(FACTURA|FRA|TICKET|RECIBO|TOTAL|BASE|IVA|FECHA|CLIENTE|TEL|CIF|NIF|EMAIL|WWW|HTTP|IBAN|BANCO|SWIFT|FORMA.*PAGO|VENCIMIENTO|ALBARAN)/i.test(l)&&!/^\d{1,2}[\/\-]/.test(l)
  });
  if(descL.length)r.descripcion=descL.slice(0,2).join(' | ').substring(0,200);

  // VINCULAR A OBRA
  var tl=text.toLowerCase();
  for(var oi=0;oi<D.obras.length;oi++){
    var ob=D.obras[oi];
    var checks=[ob.nombre,ob.dir];if(ob.cliente&&ob.cliente!=='—')checks.push(ob.cliente);
    for(var ci=0;ci<checks.length;ci++){
      if(checks[ci].length>3&&tl.indexOf(checks[ci].toLowerCase())>=0){r.obraId=ob.id;break}
    }
    if(r.obraId)break;
  }
  return r;
}

/* ── CLAUDE API (opcional, mejor calidad) ── */
function processClaude(dataUrl,apiKey,hint,proc){
  document.getElementById('proc-msg').textContent='Claude analizando…';
  document.getElementById('proc-sub').textContent='IA — máxima precisión';
  var b64=dataUrl.split(',')[1];
  var oi=D.obras.map(function(o){return o.id+'|'+o.nombre+'|'+o.cliente+'|'+o.dir}).join('; ');
  var prompt='Analiza esta factura/ticket escaneado de Manitas Express (reformas, Barcelona). Extrae TODOS los datos. Obras: '+oi+'. SOLO JSON sin markdown: {"tipo":"gasto","fecha":"YYYY-MM-DD","proveedor":"quien emite","numero":"num factura completo","cat":"Material/Subcontrata/Herramienta/Transporte/Otro","base":0.00,"iva":21,"total":0.00,"obraId":"ID obra o null","descripcion":"concepto"}';
  if(hint==='presupuesto')prompt='Analiza este presupuesto escaneado. Extrae datos. SOLO JSON: {"tipo":"presupuesto","fecha":"YYYY-MM-DD","cliente":"","descripcion":"","total":0,"obraId":"ID o null","partidas":[]}. Obras: '+oi;
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:prompt}]}]})
  }).then(function(resp){if(!resp.ok)throw new Error(resp.status);return resp.json()})
  .then(function(data){
    proc.remove();
    var txt=(data.content||[]).map(function(c){return c.text||''}).join('');
    try{
      var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
      if(parsed.tipo==='presupuesto'){autoSaveDocument(parsed,dataUrl,hint)}
      else{autoSaveGasto(parsed,dataUrl)}
    }catch(e){flash('Error respuesta Claude');console.error(txt);openFormGastoManual()}
  }).catch(function(){
    proc.remove();flash('Error API — usando OCR');
    var p2=document.createElement('div');p2.className='processing';
    p2.innerHTML='<div class="spinner"></div><div id="proc-msg">OCR…</div><small style="opacity:.6" id="proc-sub">Tesseract.js</small>';
    document.body.appendChild(p2);processTesseract(dataUrl,hint,p2);
  });
}

function autoSaveDocument(parsed,imageDataUrl,hint){
  // Solo para presupuestos (gastos van por showGastoReview)
  if(!D.presupuestos)D.presupuestos=[];
  D.presupuestos.push({
    id:uid(),fecha:parsed.fecha||today(),cliente:parsed.cliente||'',
    obraId:parsed.obraId||null,
    descripcion:parsed.descripcion||((parsed.partidas||[]).join(', ')),
    total:parsed.total||0,estado:parsed.estado||'Borrador',
    imagen:imageDataUrl,partidas:parsed.partidas||[]
  });
  save();page='presupuestos';render();
  flash('📝 Presupuesto guardado: '+(parsed.cliente||''));

function openPegarGasto(){
  openFormGeneric('<div class="modal"><div class="modal-h"><span>📋 Pegar datos desde Claude</span><button class="modal-c" onclick="closeModal()">✕</button></div><div class="modal-b">'+

    '<button class="btn-p" onclick="procesarPegado()">Importar gasto</button>'+
  '</div></div>');
}

function procesarPegado(){
  var raw=document.getElementById('pegarJSON').value.trim();
  if(!raw){flash('Pega el JSON primero');return}
  try{
    // Limpiar markdown si lo tiene
    raw=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    var data=JSON.parse(raw);
    // Puede ser un array de gastos o un solo gasto
    var items=Array.isArray(data)?data:[data];
    var count=0;
    for(var i=0;i<items.length;i++){
      var p=items[i];
      var base=p.base||0;
      var iva=p.iva||21;
      var total=p.total||(base?Math.round(base*(100+iva))/100:0);
      if(!base&&total)base=Math.round(total*100/(100+iva))/100;
      D.gastos.push({
        id:uid(),obraId:p.obraId||null,fecha:p.fecha||today(),
        cat:p.cat||'Material',proveedor:p.proveedor||'',
        factura:p.numero||p.factura||'',concepto:p.concepto||p.descripcion||'',
        base:base,iva:iva,ivaAmt:Math.round(base*iva)/100,total:total,
        pago:p.pago||'Transferencia',estado:p.estado||'Pagado',imagen:null
      });
      count++;
    }
    save();closeModal();page='gastos';render();
    flash('✅ '+count+' gasto'+(count>1?'s':'')+' importado'+(count>1?'s':''));
  }catch(e){
    console.error('Parse error:',e);
    flash('Error: el texto no es JSON válido');
  }
}

/* ── GUARDADO AUTOMÁTICO DE GASTO (sin confirmación) ── */
function autoSaveGasto(p,imgUrl){
  var base=p.base||0;
  var iva=p.iva||21;
  var total=p.total||(base?Math.round(base*(100+iva))/100:0);
  if(!base&&total)base=Math.round(total*100/(100+iva))/100;
  var cat=p.cat||'Material';
  if(['Material','Subcontrata','Herramienta','Transporte','Otro'].indexOf(cat)<0)cat='Material';
  var obraId=p.obraId||null;
  if(!obraId&&D.obras.length>0){
    var activas=D.obras.filter(function(o){return o.estado==='Activa'});
    if(activas.length===1)obraId=activas[0].id;
  }
  D.gastos.push({
    id:uid(),obraId:obraId,fecha:p.fecha||today(),cat:cat,
    proveedor:p.proveedor||'',factura:p.numero||'',concepto:p.descripcion||'',
    base:base,iva:iva,ivaAmt:Math.round(base*iva)/100,total:total,
    pago:'Transferencia',estado:'Pagado',imagen:imgUrl||null
  });
  save();page='gastos';render();
  var msg='🧾 '+(p.proveedor||'Gasto');
  if(p.numero)msg+=' | Nº '+p.numero;
  if(total)msg+=' | '+fmt(total)+'€';
  if(obraId)msg+=' → '+oName(obraId);
  flash(msg);
}
